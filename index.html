<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Library Pro</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --p: #6366f1; --bg: #0f172a; --c: #1e293b; --t: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--t); margin: 0; padding: 15px; padding-bottom: 80px; }
        
        /* Stats & Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .search { width: 100%; background: var(--c); border: 1px solid #334155; padding: 14px; border-radius: 12px; color: white; margin-bottom: 15px; font-size: 16px; }

        /* Full Screen Entry Modal */
        #modal { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 1000; padding: 20px; overflow-y: auto; }
        .modal-inner { max-width: 500px; margin: auto; }
        
        /* Progress Bar */
        .timer-wrap { width: 100%; height: 6px; background: #334155; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        #timerBar { width: 100%; height: 100%; background: var(--p); transform-origin: left; transition: transform 5s linear; }
        .timer-paused { transform: scaleX(1) !important; background: #f59e0b !important; transition: none !important; }

        /* Responsive Form */
        .f-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .f-group { display: flex; flex-direction: column; gap: 5px; }
        .f-full { grid-column: span 2; }
        label { font-size: 11px; color: #94a3b8; font-weight: bold; text-transform: uppercase; }
        input, textarea { background: var(--c); border: 1px solid #334155; padding: 12px; border-radius: 8px; color: white; font-size: 14px; width: 100%; }
        
        /* Action Buttons */
        .btn { background: var(--p); color: white; border: none; padding: 16px; border-radius: 12px; font-weight: bold; width: 100%; margin-top: 15px; font-size: 16px; cursor: pointer; }
        .btn-sec { background: transparent; color: #ef4444; margin-top: 5px; }

        /* Book Display */
        .book-card { background: var(--c); padding: 12px; border-radius: 16px; display: flex; gap: 15px; margin-bottom: 12px; border: 1px solid #334155; }
        .book-cover { width: 50px; height: 75px; border-radius: 6px; object-fit: cover; }
        
        #reader { width: 100%; border-radius: 16px; overflow: hidden; margin-bottom: 15px; display: none; border: 2px solid var(--p); }
    </style>
</head>
<body>

    <div class="header">
        <h2 style="margin:0">Library</h2>
        <button id="scanBtn" style="background:var(--p); border:none; color:white; padding:10px 20px; border-radius:10px; font-weight:bold;">+ SCAN</button>
    </div>

    <input type="text" id="search" class="search" placeholder="Search title, author...">
    <div id="reader"></div>
    <div id="bookList"></div>

    <div id="modal">
        <div class="modal-inner">
            <div class="timer-wrap"><div id="timerBar"></div></div>
            <h3 id="modalHead" style="margin:0 0 15px 0">New Asset Found</h3>
            
            <div class="f-grid" id="fieldContainer">
                </div>

            <button class="btn" id="saveBtn">CONFIRM & SAVE</button>
            <button class="btn btn-sec" id="cancelBtn">DISCARD</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA1cOfZneI_ss-QmQCkZostIQngpQ_JbtE",
        authDomain: "to-do-list-2fbf9.firebaseapp.com",
        databaseURL: "https://to-do-list-2fbf9-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "to-do-list-2fbf9",
        storageBucket: "to-do-list-2fbf9.firebasestorage.app",
        messagingSenderId: "712067178045",
        appId: "1:712067178045:web:e4091b51ce4b8fb1d69454"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const libRef = ref(db, 'final_library');

    let allBooks = [];
    let autoSaveTimeout;
    let editingId = null;
    let currentBook = {};

    const fields = [
        "title", "author", "isbn", "genre", "locationInLibrary", "numCopies", "damageNotes", "publisher", "publishDate", "summary"
    ];

    // Build the UI fields
    const container = document.getElementById('fieldContainer');
    fields.forEach(f => {
        const div = document.createElement('div');
        div.className = f === 'title' || f === 'summary' ? 'f-group f-full' : 'f-group';
        div.innerHTML = `<label>${f.replace(/([A-Z])/g, ' $1')}</label><input id="in-${f}" class="m-input">`;
        container.appendChild(div);
    });

    // --- SCANNER LOGIC ---
    const scanner = new Html5Qrcode("reader");
    document.getElementById('scanBtn').onclick = () => startScanner();

    function startScanner() {
        document.getElementById('reader').style.display = 'block';
        scanner.start({ facingMode: "environment" }, { fps: 10 }, (isbn) => {
            scanner.stop();
            document.getElementById('reader').style.display = 'none';
            fetchBook(isbn);
        });
    }

    async function fetchBook(isbn) {
        try {
            const res = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`);
            const data = await res.json();
            const b = data[`ISBN:${isbn}`] || {};
            
            currentBook = {
                title: b.title || "Nil",
                author: b.authors ? b.authors[0].name : "Nil",
                isbn: isbn,
                genre: b.subjects ? b.subjects[0].name : "Nil",
                locationInLibrary: "General",
                numCopies: 1,
                damageNotes: "Nil",
                publisher: b.publishers ? b.publishers[0].name : "Nil",
                publishDate: b.publish_date || "Nil",
                summary: b.notes || "Nil",
                cover: b.cover ? b.cover.large : ""
            };
            openModal(currentBook);
        } catch(e) { alert("Error fetching data"); }
    }

    function openModal(book, id = null) {
        editingId = id;
        fields.forEach(f => document.getElementById(`in-${f}`).value = book[f]);
        document.getElementById('modal').style.display = 'block';
        document.getElementById('timerBar').style.transform = 'scaleX(1)';
        
        // Reset Timer State
        document.getElementById('timerBar').classList.remove('timer-paused');
        
        if (!id) { // Only auto-save on NEW scans
            setTimeout(() => { document.getElementById('timerBar').style.transform = 'scaleX(0)'; }, 50);
            autoSaveTimeout = setTimeout(submitData, 5000);
        } else {
            document.getElementById('timerBar').classList.add('timer-paused');
        }
    }

    // INTERACTION CHECK: If user touches an input, stop the timer
    document.getElementById('fieldContainer').addEventListener('input', () => {
        clearTimeout(autoSaveTimeout);
        document.getElementById('timerBar').classList.add('timer-paused');
    });

    function submitData() {
        clearTimeout(autoSaveTimeout);
        const data = { cover: currentBook.cover || "" };
        fields.forEach(f => data[f] = document.getElementById(`in-${f}`).value || "Nil");
        
        if (editingId) update(ref(db, `final_library/${editingId}`), data);
        else push(libRef, data);
        
        closeModal();
        // AUTO-CONTINUE: Start scanner for next book
        setTimeout(startScanner, 500); 
    }

    function closeModal() {
        clearTimeout(autoSaveTimeout);
        document.getElementById('modal').style.display = 'none';
        editingId = null;
    }

    document.getElementById('saveBtn').onclick = submitData;
    document.getElementById('cancelBtn').onclick = () => { closeModal(); startScanner(); };

    // --- RENDER & SEARCH ---
    onValue(libRef, (snap) => {
        allBooks = [];
        const data = snap.val();
        for (let id in data) allBooks.push({ id, ...data[id] });
        render(allBooks);
    });

    function render(list) {
        const bl = document.getElementById('bookList');
        bl.innerHTML = '';
        list.forEach(b => {
            const div = document.createElement('div');
            div.className = 'book-card';
            div.onclick = () => openModal(b, b.id);
            div.innerHTML = `
                <img src="${b.cover}" class="book-cover">
                <div style="flex:1">
                    <div style="font-weight:bold">${b.title}</div>
                    <div style="font-size:12px; opacity:0.7">${b.author}</div>
                    <div style="font-size:10px; margin-top:5px; color:var(--p)">LOC: ${b.locationInLibrary}</div>
                </div>
            `;
            bl.appendChild(div);
        });
    }

    document.getElementById('search').oninput = (e) => {
        const val = e.target.value.toLowerCase();
        render(allBooks.filter(b => b.title.toLowerCase().includes(val) || b.isbn.includes(val)));
    };
</script>
</body>
</html>
