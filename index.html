<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Functional To-Do</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; display: flex; justify-content: center; padding: 50px; }
        .box { background: #1e1e1e; padding: 20px; border-radius: 8px; width: 300px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { width: 70%; padding: 8px; border-radius: 4px; border: none; }
        button { padding: 8px; cursor: pointer; background: #00d4ff; border: none; border-radius: 4px; font-weight: bold; }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { background: #2a2a2a; padding: 10px; margin-bottom: 5px; border-radius: 4px; display: flex; justify-content: space-between; }
        .del-btn { background: #ff4d4d; color: white; font-size: 10px; }
    </style>
</head>
<body>

<div class="box">
    <h3>Cloud Tasks</h3>
    <input type="text" id="taskInput" placeholder="New task...">
    <button id="addBtn">Add</button>
    <ul id="taskList"></ul>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, remove, onChildRemoved } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // Your specific config
    const firebaseConfig = {
        apiKey: "AIzaSyA1cOfZneI_ss-QmQCkZostIQngpQ_JbtE",
        authDomain: "to-do-list-2fbf9.firebaseapp.com",
        databaseURL: "https://to-do-list-2fbf9-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "to-do-list-2fbf9",
        storageBucket: "to-do-list-2fbf9.firebasestorage.app",
        messagingSenderId: "712067178045",
        appId: "1:712067178045:web:e4091b51ce4b8fb1d69454"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const todoRef = ref(db, 'tasks');

    const input = document.getElementById('taskInput');
    const btn = document.getElementById('addBtn');
    const list = document.getElementById('taskList');

    // Add task to Firebase
    btn.onclick = () => {
        if (input.value.trim() !== "") {
            push(todoRef, { text: input.value });
            input.value = "";
        }
    };

    // Listen for new tasks
    onChildAdded(todoRef, (snapshot) => {
        const li = document.createElement('li');
        li.id = snapshot.key;
        li.innerHTML = `
            <span>${snapshot.val().text}</span>
            <button class="del-btn" onclick="deleteTask('${snapshot.key}')">X</button>
        `;
        list.appendChild(li);
    });

    // Listen for deletions
    onChildRemoved(todoRef, (snapshot) => {
        const item = document.getElementById(snapshot.key);
        if (item) item.remove();
    });

    // Global function to delete
    window.deleteTask = (id) => {
        remove(ref(db, `tasks/${id}`));
    };
</script>

</body>
</html>
