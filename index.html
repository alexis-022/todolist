<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Chat Pro</title>
    <style>
        :root {
            --p: #6366f1;
            --bg: #0b0f1a;
            --card: rgba(30, 41, 59, 0.7);
            --t: #f8fafc;
            --my-msg: #4f46e5;
            --their-msg: #1e293b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--t);
            margin: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background-image: radial-gradient(circle at top right, #1e1b4b, var(--bg));
        }

        /* Login Overlay */
        #login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--card);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Header */
        header {
            padding: 15px 20px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .room-info h2 { margin: 0; font-size: 1.1rem; }
        .room-info p { margin: 0; font-size: 0.75rem; opacity: 0.6; }

        /* Message Area */
        #chat-window {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
            animation: pop 0.2s ease-out;
        }

        @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .msg.mine {
            align-self: flex-end;
            background: var(--my-msg);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .msg.theirs {
            align-self: flex-start;
            background: var(--their-msg);
            border-bottom-left-radius: 4px;
        }

        .sender-name {
            font-size: 0.65rem;
            font-weight: 800;
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
        }

        .mine .sender-name { color: rgba(255,255,255,0.7); }
        .theirs .sender-name { color: var(--p); }

        .timestamp {
            font-size: 0.6rem;
            opacity: 0.5;
            margin-top: 4px;
            display: block;
            text-align: right;
        }

        /* Input Area */
        .input-wrap {
            padding: 20px;
            background: rgba(15, 23, 42, 0.9);
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .input-box {
            background: #1e293b;
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 5px 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px;
            color: white;
            outline: none;
            font-size: 1rem;
        }

        button.send-btn {
            background: var(--p);
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        button.send-btn:active { transform: scale(0.9); }

        /* Generic UI */
        .field { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 15px; }
        .primary-btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--p); color: white; font-weight: bold; font-size: 1rem; cursor: pointer; }

    </style>
</head>
<body>

    <!-- Login Layer -->
    <div id="login-overlay">
        <div class="login-card">
            <h1 style="margin-top:0">Nexus Chat</h1>
            <p style="opacity:0.6; margin-bottom: 25px;">Enter your credentials to join</p>
            <input type="text" id="username" class="field" placeholder="Username">
            <input type="text" id="roomCode" class="field" placeholder="Room Code (e.g. General)">
            <button id="joinBtn" class="primary-btn">Enter Room</button>
        </div>
    </div>

    <header>
        <div class="room-info">
            <h2 id="room-display">Room Name</h2>
            <p id="user-display">Logged in as...</p>
        </div>
        <button onclick="location.reload()" style="background:transparent; border:none; color:#ef4444; font-size: 0.8rem; font-weight: bold;">LEAVE</button>
    </header>

    <main id="chat-window"></main>

    <div class="input-wrap">
        <div class="input-box">
            <input type="text" id="messageInput" placeholder="Type a message...">
            <button class="send-btn" id="sendBtn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Your Firebase Configuration (Using the same one from our Library project)
        const firebaseConfig = {
            apiKey: "AIzaSyA1cOfZneI_ss-QmQCkZostIQngpQ_JbtE",
            authDomain: "to-do-list-2fbf9.firebaseapp.com",
            databaseURL: "https://to-do-list-2fbf9-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "to-do-list-2fbf9",
            storageBucket: "to-do-list-2fbf9.firebasestorage.app",
            messagingSenderId: "712067178045",
            appId: "1:712067178045:web:e4091b51ce4b8fb1d69454"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let myUser = "";
        let currentRoom = "";

        const loginOverlay = document.getElementById('login-overlay');
        const chatWindow = document.getElementById('chat-window');
        const messageInput = document.getElementById('messageInput');

        // JOIN ROOM LOGIC
        document.getElementById('joinBtn').onclick = () => {
            const user = document.getElementById('username').value.trim();
            const room = document.getElementById('roomCode').value.trim();

            if (user && room) {
                myUser = user;
                currentRoom = room.toLowerCase();
                
                document.getElementById('room-display').innerText = "# " + room;
                document.getElementById('user-display').innerText = "Logged in as " + user;
                loginOverlay.style.display = 'none';

                startChat();
            } else {
                alert("Please enter both a username and a room code.");
            }
        };

        function startChat() {
            const chatRef = ref(db, 'chats/' + currentRoom);

            // Listen for Messages
            onValue(chatRef, (snapshot) => {
                chatWindow.innerHTML = "";
                const data = snapshot.val();
                if (data) {
                    Object.values(data).forEach(msg => {
                        renderMessage(msg);
                    });
                    chatWindow.scrollTop = chatWindow.scrollHeight;
                }
            });
        }

        function renderMessage(msg) {
            const isMine = msg.user === myUser;
            const div = document.createElement('div');
            div.className = `msg ${isMine ? 'mine' : 'theirs'}`;
            
            // Format Time
            const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : "";

            div.innerHTML = `
                <span class="sender-name">${msg.user}</span>
                <div class="text">${msg.text}</div>
                <span class="timestamp">${time}</span>
            `;
            chatWindow.appendChild(div);
        }

        // SEND MESSAGE LOGIC
        function sendMessage() {
            const text = messageInput.value.trim();
            if (text && currentRoom) {
                const chatRef = ref(db, 'chats/' + currentRoom);
                push(chatRef, {
                    user: myUser,
                    text: text,
                    timestamp: Date.now() // Local timestamp fallback
                });
                messageInput.value = "";
            }
        }

        document.getElementById('sendBtn').onclick = sendMessage;
        messageInput.onkeypress = (e) => { if(e.key === 'Enter') sendMessage(); };

    </script>
</body>
</html>
