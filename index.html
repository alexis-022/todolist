<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Ultra Library</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --p: #6366f1; --bg: #0b0f1a; --card: rgba(30, 41, 59, 0.7); --t: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--t); margin: 0; padding: 20px; min-height: 100vh; }

        /* Search & Layout */
        .search-input { width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 16px; border-radius: 16px; color: white; margin-bottom: 25px; backdrop-filter: blur(10px); }
        .book-grid { display: grid; gap: 15px; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); padding-bottom: 100px; }
        .book-card { background: var(--card); border-radius: 18px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #1e293b; }
        .card-meta { padding: 10px; font-size: 0.8rem; }

        /* Scanner Overlay */
        #scanner-view { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; flex-direction: column; }
        #reader { flex: 1; }
        .close-scan { position: absolute; top: 40px; right: 20px; background: #ef4444; border: none; color: white; padding: 10px 20px; border-radius: 20px; z-index: 5001; font-weight: bold; }

        /* The 25-Field Modal */
        #modal { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 4000; padding: 20px; overflow-y: auto; }
        .modal-content { max-width: 600px; margin: auto; }
        .timer-track { width: 100%; height: 4px; background: #334155; border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
        #timerBar { width: 100%; height: 100%; background: var(--p); transform-origin: left; transition: transform 5s linear; }
        .paused { transform: scaleX(1) !important; background: #f59e0b !important; transition: none !important; }

        /* Dynamic Form Grid */
        .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .wide { grid-column: span 2; }
        label { font-size: 9px; font-weight: 800; color: var(--p); text-transform: uppercase; display: block; margin-bottom: 4px; }
        input, textarea { width: 100%; background: #1e293b; border: 1px solid #334155; padding: 12px; border-radius: 10px; color: white; font-size: 14px; }
        
        .fab { position: fixed; bottom: 30px; right: 30px; width: 60px; height: 60px; background: var(--p); border-radius: 50%; border: none; color: white; font-size: 24px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); z-index: 100; }
        .save-btn { background: var(--p); color: white; border: none; padding: 16px; border-radius: 14px; width: 100%; font-weight: 800; margin: 20px 0; }
    </style>
</head>
<body>

    <input type="text" id="search" class="search-input" placeholder="Search archive...">
    <div class="book-grid" id="bookGrid"></div>
    <button class="fab" id="openScanner">📸</button>

    <div id="scanner-view">
        <button class="close-scan" id="stopScan">CANCEL</button>
        <div id="reader"></div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <div class="timer-track"><div id="timerBar"></div></div>
            <div class="field-grid" id="formContainer"></div>
            <button class="save-btn" id="confirmSave">SAVE TO CLOUD</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA1cOfZneI_ss-QmQCkZostIQngpQ_JbtE",
        authDomain: "to-do-list-2fbf9.firebaseapp.com",
        databaseURL: "https://to-do-list-2fbf9-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "to-do-list-2fbf9",
        storageBucket: "to-do-list-2fbf9.firebasestorage.app",
        messagingSenderId: "712067178045",
        appId: "1:712067178045:web:e4091b51ce4b8fb1d69454"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const libRef = ref(db, 'nexus_ultra_v1');

    // ALL 25 CATEGORIES
    const categories = [
        "title", "author", "isbn", "publishDate", "publisher", "genre", "seriesInfo", 
        "language", "pageCount", "locationInLibrary", "numCopies", "copyAvailability",
        "type", "format", "tags", "excerpts", "summary", "notes", "damageNotes",
        "currentUser", "lastUser", "reservesPlaced", "ratings", "reviews"
    ];

    const container = document.getElementById('formContainer');
    categories.forEach(cat => {
        const div = document.createElement('div');
        div.className = ["title", "summary", "excerpts", "reviews", "notes"].includes(cat) ? "wide" : "";
        div.innerHTML = `<label>${cat}</label><input id="f-${cat}" class="lib-input">`;
        container.appendChild(div);
    });

    let autoTimer, currentBook = {}, editingId = null, allBooks = [];
    const scanner = new Html5Qrcode("reader");

    document.getElementById('openScanner').onclick = () => {
        document.getElementById('scanner-view').style.display = 'flex';
        scanner.start({ facingMode: "environment" }, { fps: 20 }, onScan);
    };

    document.getElementById('stopScan').onclick = () => {
        scanner.stop(); document.getElementById('scanner-view').style.display = 'none';
    };

    async function onScan(isbn) {
        scanner.stop();
        document.getElementById('scanner-view').style.display = 'none';
        
        // UPGRADED API FETCH (Google Books + OpenLibrary Fallback)
        let bookInfo = { isbn: isbn };
        try {
            const gRes = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
            const gData = await gRes.json();
            
            if (gData.items && gData.items[0]) {
                const vol = gData.items[0].volumeInfo;
                bookInfo.title = vol.title;
                bookInfo.author = vol.authors?.join(', ');
                bookInfo.publisher = vol.publisher;
                bookInfo.publishDate = vol.publishedDate;
                bookInfo.pageCount = vol.pageCount;
                bookInfo.summary = vol.description;
                bookInfo.genre = vol.categories?.[0];
                bookInfo.language = vol.language;
                bookInfo.cover = vol.imageLinks?.thumbnail?.replace('http:', 'https:');
            } else {
                // Fallback to OpenLibrary
                const oRes = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`);
                const oData = await oRes.json();
                const b = oData[`ISBN:${isbn}`];
                if (b) {
                    bookInfo.title = b.title;
                    bookInfo.author = b.authors?.[0]?.name;
                    bookInfo.cover = b.cover?.large;
                }
            }
        } catch(e) { console.error("API Fail"); }

        // Populate with "Nil" for missing values
        categories.forEach(c => currentBook[c] = bookInfo[c] || "Nil");
        currentBook.cover = bookInfo.cover || "";
        showModal(currentBook);
    }

    function showModal(book, id = null) {
        editingId = id;
        categories.forEach(c => document.getElementById(`f-${c}`).value = book[c]);
        document.getElementById('modal').style.display = 'block';
        const bar = document.getElementById('timerBar');
        bar.classList.remove('paused');
        bar.style.transform = 'scaleX(1)';

        if (!id) {
            setTimeout(() => { bar.style.transform = 'scaleX(0)'; }, 50);
            autoTimer = setTimeout(save, 5000);
        } else { bar.classList.add('paused'); }
    }

    // INTERACTION OBSERVER
    document.getElementById('formContainer').addEventListener('focusin', () => {
        clearTimeout(autoTimer);
        document.getElementById('timerBar').classList.add('paused');
    });

    function save() {
        clearTimeout(autoTimer);
        const data = { cover: currentBook.cover || "" };
        categories.forEach(c => data[c] = document.getElementById(`f-${c}`).value);
        
        if (editingId) update(ref(db, `nexus_ultra_v1/${editingId}`), data);
        else push(libRef, data);

        document.getElementById('modal').style.display = 'none';
        // IMMEDIATELY REOPEN SCANNER
        document.getElementById('openScanner').click();
    }

    document.getElementById('confirmSave').onclick = save;

    onValue(libRef, (snap) => {
        const data = snap.val();
        allBooks = data ? Object.entries(data).map(([id, v]) => ({id, ...v})) : [];
        // SORTING: Fiction (A-Z Name) vs Non-Fiction (Genre)
        allBooks.sort((a,b) => {
            const isNF = (g) => ["Science", "History", "Non-fiction"].some(x => g?.includes(x));
            if (isNF(a.genre) && !isNF(b.genre)) return 1;
            if (!isNF(a.genre) && isNF(b.genre)) return -1;
            return a.title.localeCompare(b.title);
        });
        render();
    });

    function render(list = allBooks) {
        const grid = document.getElementById('bookGrid');
        grid.innerHTML = '';
        list.forEach(b => {
            const div = document.createElement('div');
            div.className = 'book-card';
            div.onclick = () => showModal(b, b.id);
            div.innerHTML = `
                <img src="${b.cover || 'https://via.placeholder.com/150x225?text=No+Cover'}" class="card-img">
                <div class="card-meta">
                    <strong>${b.title}</strong><br><span style="opacity:0.6">${b.author}</span>
                </div>
            `;
            grid.appendChild(div);
        });
    }

    document.getElementById('search').oninput = (e) => {
        const v = e.target.value.toLowerCase();
        render(allBooks.filter(b => b.title.toLowerCase().includes(v) || b.isbn.includes(v)));
    };
</script>
</body>
</html>
