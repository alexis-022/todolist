<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Nexus Chat Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root {
            --p: #6366f1; --bg: #0b0f1a; --card: rgba(30, 41, 59, 0.7);
            --t: #f8fafc; --my-msg: #4f46e5; --their-msg: #1e293b;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background: var(--bg); color: var(--t); margin: 0;
            height: 100%; width: 100%; position: fixed; overflow: hidden;
        }
        header {
            position: absolute; top: 0; left: 0; right: 0; height: 70px;
            padding: 0 20px; padding-top: env(safe-area-inset-top);
            background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center; z-index: 100;
        }
        #chat-window {
            position: absolute; top: 70px; bottom: 85px; left: 0; right: 0;
            overflow-y: auto; padding: 20px; display: flex; flex-direction: column;
            gap: 12px; -webkit-overflow-scrolling: touch;
        }
        .msg {
            max-width: 85%; padding: 10px 14px; border-radius: 18px;
            font-size: 16px; line-height: 1.4; animation: pop 0.2s ease-out;
        }
        .msg.mine { align-self: flex-end; background: var(--my-msg); border-bottom-right-radius: 4px; }
        .msg.theirs { align-self: flex-start; background: var(--their-msg); border-bottom-left-radius: 4px; }
        .sender-name { font-size: 10px; font-weight: 800; color: var(--p); margin-bottom: 2px; display: block; text-transform: uppercase; }
        .input-wrap {
            position: absolute; bottom: 0; left: 0; right: 0; padding: 15px;
            padding-bottom: calc(15px + env(safe-area-inset-bottom));
            background: #0f172a; border-top: 1px solid rgba(255,255,255,0.1); z-index: 100;
        }
        .input-box {
            background: #1e293b; border-radius: 25px; display: flex; align-items: center;
            padding: 4px 6px 4px 15px; border: 1px solid rgba(255,255,255,0.1);
        }
        input { flex: 1; background: transparent; border: none; padding: 10px 0; color: white; outline: none; font-size: 16px; }
        .send-btn { background: var(--p); border: none; width: 38px; height: 38px; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        #login-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: var(--card); backdrop-filter: blur(15px); padding: 30px; border-radius: 24px; width: 100%; max-width: 400px; border: 1px solid rgba(255,255,255,0.1); text-align: center; }
        .field { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 12px; font-size: 16px; }
        .primary-btn { width: 100%; padding: 16px; border-radius: 12px; border: none; background: var(--p); color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div id="login-overlay">
        <div class="login-card">
            <h2>Nexus Chat</h2>
            <input type="text" id="username" class="field" placeholder="Username">
            <input type="text" id="roomCode" class="field" placeholder="Room Code">
            <button id="joinBtn" class="primary-btn">Join Chat</button>
            <p style="font-size: 10px; margin-top: 15px; opacity: 0.5;">Add to Home Screen for App experience</p>
        </div>
    </div>
    <header>
        <div>
            <div id="room-display" style="font-weight: 800; font-size: 1.1rem;"># Loading...</div>
            <div id="user-display" style="font-size: 0.7rem; opacity: 0.6;">...</div>
        </div>
        <button onclick="location.reload()" style="background:none; border:none; color:#ef4444; font-weight:bold;">EXIT</button>
    </header>
    <main id="chat-window"></main>
    <div class="input-wrap">
        <div class="input-box">
            <input type="text" id="messageInput" placeholder="Message..." autocomplete="off">
            <button class="send-btn" id="sendBtn">➤</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA1cOfZneI_ss-QmQCkZostIQngpQ_JbtE",
            authDomain: "to-do-list-2fbf9.firebaseapp.com",
            databaseURL: "https://to-do-list-2fbf9-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "to-do-list-2fbf9",
            storageBucket: "to-do-list-2fbf9.firebasestorage.app",
            messagingSenderId: "712067178045",
            appId: "1:712067178045:web:e4091b51ce4b8fb1d69454"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let myUser = "", currentRoom = "";
        const chatWindow = document.getElementById('chat-window');
        const notifySound = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');

        // JOIN LOGIC
        document.getElementById('joinBtn').onclick = () => {
            const u = document.getElementById('username').value.trim();
            const r = document.getElementById('roomCode').value.trim();
            if(u && r) {
                myUser = u; currentRoom = r.toLowerCase();
                document.getElementById('room-display').innerText = "# " + r;
                document.getElementById('user-display').innerText = u;
                document.getElementById('login-overlay').style.display = 'none';
                
                // Request Notification Permission
                if ("Notification" in window) {
                    Notification.requestPermission();
                }
                
                initChat();
            }
        };

        function initChat() {
            let initialLoad = true;
            onValue(ref(db, 'chats/' + currentRoom), (snap) => {
                chatWindow.innerHTML = "";
                const data = snap.val();
                if(data) {
                    const messages = Object.values(data);
                    messages.forEach(msg => {
                        const div = document.createElement('div');
                        div.className = `msg ${msg.user === myUser ? 'mine' : 'theirs'}`;
                        div.innerHTML = `<span class="sender-name">${msg.user}</span>${msg.text}`;
                        chatWindow.appendChild(div);
                    });
                    chatWindow.scrollTop = chatWindow.scrollHeight;

                    // Notification Logic
                    const lastMsg = messages[messages.length - 1];
                    if (!initialLoad && lastMsg.user !== myUser) {
                        notifySound.play().catch(e => console.log("Sound blocked"));
                        if (Notification.permission === "granted") {
                            new Notification(`New message in #${currentRoom}`, { body: `${lastMsg.user}: ${lastMsg.text}` });
                        }
                    }
                }
                initialLoad = false;
            });
        }

        function send() {
            const inp = document.getElementById('messageInput');
            if(inp.value.trim()) {
                push(ref(db, 'chats/' + currentRoom), {
                    user: myUser, text: inp.value.trim(), timestamp: Date.now()
                });
                inp.value = "";
                inp.focus();
            }
        }
        document.getElementById('sendBtn').onclick = send;
        document.getElementById('messageInput').onkeypress = (e) => { if(e.key==='Enter') send(); };

        // REGISTER SERVICE WORKER
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').then(() => console.log("PWA Active"));
        }
    </script>
</body>
</html>
