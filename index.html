<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Dashboard</title>
  <style>
    :root {
      --bg-color: #0b0c10;
      --card-bg: #1f2833;
      --text-main: #c5c6c7;
      --text-bright: #ffffff;
      --active-accent: #1f4068;
      --active-glow: #4eedb2;
      --upcoming-accent: #66fcf1;
    }

    body {
      font-family: '-apple-system', BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #timetable-container {
      width: 100%;
      max-width: 440px;
      background: var(--card-bg);
      padding: 25px;
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
    }

    .header-section {
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 15px;
    }

    h2 {
      margin: 0 0 5px 0;
      color: var(--text-bright);
      font-size: 1.8rem;
      letter-spacing: -0.5px;
    }

    #current-time {
      font-size: 1.2rem;
      color: var(--upcoming-accent);
      font-weight: bold;
    }

    #classes-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .class-card {
      padding: 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      border-left: 6px solid transparent;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
    }

    /* PAST CLASSES - Compacted, Grayed out at the top */
    .past-class {
      opacity: 0.15;
      filter: grayscale(100%);
      padding: 10px 14px;
      font-size: 0.95rem;
    }
    .past-class .class-title {
      font-size: 1rem;
      font-weight: 500;
    }
    .past-class .class-room {
      top: 10px;
      font-size: 0.7rem;
    }

    /* ACTIVE HERO CLASS - Centered Focal Point */
    .active-class {
      background: var(--active-accent);
      border-left-color: var(--active-glow);
      transform: scale(1.03);
      padding: 24px 20px;
      margin: 10px 0;
      box-shadow: 0 8px 30px rgba(78, 237, 178, 0.15);
      animation: pulseGlow 3s infinite alternate;
    }
    @keyframes pulseGlow {
      0% { box-shadow: 0 8px 25px rgba(78, 237, 178, 0.1); }
      100% { box-shadow: 0 8px 35px rgba(78, 237, 178, 0.25); }
    }
    .active-class .class-title {
      font-size: 1.6rem;
      color: var(--text-bright);
    }
    .active-class .class-room {
      top: 24px;
      right: 20px;
      background: rgba(78, 237, 178, 0.2);
      color: var(--active-glow);
      font-size: 0.9rem;
    }
    .active-class .class-time {
      font-size: 1rem;
      color: #9fedff;
      margin-top: 6px;
    }

    /* UPCOMING CLASSES - Stacked at the bottom */
    .upcoming-class {
      border-left-color: rgba(102, 252, 241, 0.3);
    }

    .status-badge {
      font-weight: 800;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 6px;
    }
    .active-class .status-badge { color: var(--active-glow); }
    .upcoming-class .status-badge { color: var(--upcoming-accent); }

    .class-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-bright);
    }

    .class-time {
      font-size: 0.9rem;
      margin-top: 4px;
      color: var(--text-main);
    }

    .class-room {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255, 255, 255, 0.08);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: bold;
      color: var(--text-bright);
    }

    .countdown {
      font-size: 0.9rem;
      margin-top: 10px;
      font-style: italic;
      color: var(--active-glow);
      font-weight: 500;
    }

    .no-classes {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-main);
      font-size: 1.1rem;
    }

    /* WEEK VIEW TRIGGER BUTTON */
    .week-btn {
      margin-top: 25px;
      background: transparent;
      border: 1px solid var(--upcoming-accent);
      color: var(--upcoming-accent);
      padding: 12px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.95rem;
    }
    .week-btn:hover {
      background: rgba(102, 252, 241, 0.1);
      transform: translateY(-1px);
    }

    /* FULL WEEK MODAL OVERLAY */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(11, 12, 16, 0.95);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: none;
      justify-content: center;
      align-items: center;
      overflow-y: auto;
      padding: 20px;
      box-sizing: border-box;
    }
    .modal-content {
      background: var(--card-bg);
      width: 100%;
      max-width: 900px;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      position: relative;
    }
    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.05);
      border: none;
      color: var(--text-bright);
      font-size: 1.2rem;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
    }
    .close-btn:hover { background: rgba(255,255,255,0.15); }
    
    .grid-container {
      display: grid;
      grid-template-columns: repeat(5, minmax(140px, 1fr));
      gap: 12px;
      margin-top: 25px;
      overflow-x: auto;
    }
    @media (max-width: 768px) {
      .grid-container {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
    }
    .day-column {
      background: rgba(255,255,255,0.02);
      border-radius: 12px;
      padding: 10px;
    }
    .day-header {
      text-align: center;
      font-weight: bold;
      color: var(--upcoming-accent);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 8px;
      margin-bottom: 10px;
    }
    .mini-card {
      background: rgba(255,255,255,0.04);
      padding: 8px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 0.8rem;
      border-left: 3px solid rgba(102, 252, 241, 0.4);
    }
    .mini-title { font-weight: bold; color: var(--text-bright); margin-bottom: 2px;}
    .mini-meta { color: #888; font-size: 0.75rem; }
  </style>
</head>
<body>

  <div id="timetable-container">
    <div class="header-section">
      <h2 id="current-day">Syncing...</h2>
      <div id="current-time">00:00:00</div>
    </div>
    <div id="classes-list">
      <div class="no-classes">Connecting to Firebase...</div>
    </div>
    <button class="week-btn" id="open-week-btn">📅 View Full Week Timetable</button>
  </div>

  <div class="modal-overlay" id="week-modal">
    <div class="modal-content">
      <button class="close-btn" id="close-week-btn">✕ Close</button>
      <h2 style="margin-bottom: 5px;">Weekly Rotation Grid</h2>
      <span style="color: var(--upcoming-accent); font-size: 0.9rem;">Master Schedule View</span>
      <div class="grid-container" id="modal-grid-target"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    // Your active production configurations loaded directly
    const firebaseConfig = {
      apiKey: "AIzaSyA1cOfZneI_ss-QmQCkZostIQngpQ_JbtE",
      authDomain: "to-do-list-2fbf9.firebaseapp.com",
      databaseURL: "https://to-do-list-2fbf9-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "to-do-list-2fbf9",
      storageBucket: "to-do-list-2fbf9.firebasestorage.app",
      messagingSenderId: "712067178045",
      appId: "1:712067178045:web:e4091b51ce4b8fb1d69454"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    let globalScheduleCache = null;

    const timetableRef = ref(database, 'timetable');
    get(timetableRef).then((snapshot) => {
      if (snapshot.exists()) {
        globalScheduleCache = snapshot.val();
        
        // Boot primary structural view loops
        updateDashboard(globalScheduleCache);
        buildWeekModalGrid(globalScheduleCache);
        setInterval(() => updateDashboard(globalScheduleCache), 1000);
      } else {
        document.getElementById('classes-list').innerHTML = "<div class='no-classes'>❌ No database data match structure rules.</div>";
      }
    }).catch((e) => {
      console.error(e);
      document.getElementById('classes-list').innerHTML = "<div class='no-classes'>❌ Engine database connection breakdown.</div>";
    });

    function updateDashboard(schedule) {
      const now = new Date();
      
      document.getElementById('current-time').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const currentDay = days[now.getDay()];
      document.getElementById('current-day').innerText = currentDay;

      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const currentTimeString = `${hours}:${minutes}`;

      const todaysClasses = schedule[currentDay];
      const listContainer = document.getElementById('classes-list');
      listContainer.innerHTML = '';

      if (!todaysClasses || Object.keys(todaysClasses).length === 0) {
        listContainer.innerHTML = "<div class='no-classes'>No classes today. Rest up! 🌴</div>";
        return;
      }

      // Convert daily structures into ordered linear arrays sorted chronologically
      const sortedClasses = Object.values(todaysClasses).sort((a, b) => {
        return padTimeStr(a.start).localeCompare(padTimeStr(b.start));
      });

      let pastStack = [];
      let activeItem = null;
      let upcomingStack = [];

      const currentMinutes = (now.getHours() * 60) + now.getMinutes();

      // Step 1: Categorize where each spell fits relative to the present second
      sortedClasses.forEach(item => {
        const safeStart = padTimeStr(item.start);
        const safeEnd = padTimeStr(item.end);

        if (currentTimeString >= safeStart && currentTimeString <= safeEnd) {
          activeItem = { ...item, type: 'ACTIVE' };
        } else if (currentTimeString > safeEnd) {
          pastStack.push({ ...item, type: 'PAST' });
        } else {
          upcomingStack.push({ ...item, type: 'UPCOMING' });
        }
      });

      // FALLBACK LOOKAHEAD: If there isn't an exact ongoing class match right now (e.g. interval, lunch, or before school)
      // convert the very first item in the upcoming stack into our central visual "Hero" item.
      if (!activeItem && upcomingStack.length > 0) {
        activeItem = { ...upcomingStack.shift(), type: 'NEXT' };
      }

      // TRUNCATE HISTORY STACK: Limit display to only the last 2 finished classes
      if (pastStack.length > 2) {
        pastStack = pastStack.slice(-2);
      }

      // Step 2: Render past array layers
      pastStack.forEach(item => {
        const card = document.createElement('div');
        card.className = 'class-card past-class';
        const roomBadge = item.room ? `<div class="class-room">${item.room}</div>` : '';
        card.innerHTML = `
          <div class="class-title">${item.name}</div>
          ${roomBadge}
        `;
        listContainer.appendChild(card);
      });

      // Step 3: Render center focal element layer
      if (activeItem) {
        const card = document.createElement('div');
        card.className = 'class-card active-class';
        const roomBadge = activeItem.room ? `<div class="class-room">${activeItem.room}</div>` : '';
        
        const safeStart = padTimeStr(activeItem.start);
        const safeEnd = padTimeStr(activeItem.end);
        
        if (activeItem.type === 'ACTIVE') {
          const remaining = parseTimeToMinutes(safeEnd) - currentMinutes;
          card.innerHTML = `
            <div class="status-badge">🚨 Now In Progress</div>
            <div class="class-title">${activeItem.name}</div>
            <div class="class-time">${format12Hour(safeStart)} - ${format12Hour(safeEnd)}</div>
            ${roomBadge}
            <div class="countdown">Ends in ${remaining} min${remaining > 1 ? 's' : ''}</div>
          `;
        } else {
          // It's a 'NEXT' lookahead card (Break / Interval period)
          const untilStart = parseTimeToMinutes(safeStart) - currentMinutes;
          let countdownText = `Starts in ${untilStart} min${untilStart > 1 ? 's' : ''}`;
          if (untilStart > 60) {
            countdownText = `Starts in ${Math.floor(untilStart / 60)}h ${untilStart % 60}m`;
          }
          card.innerHTML = `
            <div class="status-badge" style="color: var(--upcoming-accent);">Up Next Focus</div>
            <div class="class-title">${activeItem.name}</div>
            <div class="class-time">Starts at ${format12Hour(safeStart)}</div>
            ${roomBadge}
            <div class="countdown" style="color: var(--upcoming-accent);">${countdownText}</div>
          `;
        }
        listContainer.appendChild(card);
      }

      // Step 4: Render trailing upcoming element stack layers
      upcomingStack.forEach(item => {
        const card = document.createElement('div');
        card.className = 'class-card upcoming-class';
        const safeStart = padTimeStr(item.start);
        const roomBadge = item.room ? `<div class="class-room">${item.room}</div>` : '';
        
        const untilStart = parseTimeToMinutes(safeStart) - currentMinutes;
        let countdownText = `${untilStart} min`;
        if (untilStart > 60) {
          countdownText = `${Math.floor(untilStart / 60)}h ${untilStart % 60}m`;
        }

        card.innerHTML = `
          <div class="status-badge">Upcoming</div>
          <div class="class-title">${item.name}</div>
          <div class="class-time">Starts at ${format12Hour(safeStart)}</div>
          ${roomBadge}
          <div class="countdown" style="color: var(--text-main); font-weight: normal; font-size: 0.8rem;">In ${countdownText}</div>
        `;
        listContainer.appendChild(card);
      });
    }

    // Modal Grid Construction UI Engine Logic
    function buildWeekModalGrid(schedule) {
      const target = document.getElementById('modal-grid-target');
      target.innerHTML = '';
      const orderOfDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday'];

      orderOfDays.forEach(day => {
        const col = document.createElement('div');
        col.className = 'day-column';
        col.innerHTML = `<div class="day-header">${day.substring(0,3)}</div>`;

        const dayData = schedule[day];
        if (dayData) {
          const sorted = Object.values(dayData).sort((a,b) => padTimeStr(a.start).localeCompare(padTimeStr(b.start)));
          sorted.forEach(item => {
            const roomTxt = item.room ? ` | Rm: ${item.room}` : '';
            const mini = document.createElement('div');
            mini.className = 'mini-card';
            mini.innerHTML = `
              <div class="mini-title">${item.name}</div>
              <div class="mini-meta">${format12Hour(padTimeStr(item.start))}${roomTxt}</div>
            `;
            col.appendChild(mini);
          });
        } else {
          col.innerHTML += `<div style="text-align:center; color:#555; padding-top:10px; font-size:0.8rem;">Off</div>`;
        }
        target.appendChild(col);
      });
    }

    // Modal view visibility control triggers
    const modal = document.getElementById('week-modal');
    document.getElementById('open-week-btn').addEventListener('click', () => modal.style.display = 'flex');
    document.getElementById('close-week-btn').addEventListener('click', () => modal.style.display = 'none');
    window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

    function padTimeStr(str) {
      const [h, m] = str.split(':');
      return `${h.padStart(2, '0')}:${m}`;
    }

    function parseTimeToMinutes(timeStr) {
      const [h, m] = timeStr.split(':').map(Number);
      return (h * 60) + m;
    }

    function format12Hour(timeStr) {
      const [h, m] = timeStr.split(':');
      let hour = parseInt(h);
      const ampm = hour >= 12 ? 'pm' : 'am';
      hour = hour % 12 || 12;
      return `${hour}:${m}${ampm}`;
    }
  </script>
</body>
</html>
