<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Dashboard</title>
  <style>
    :root {
      --bg-color: #0b0c10;
      --card-bg: #1f2833;
      --text-main: #c5c6c7;
      --text-bright: #ffffff;
      --active-accent: #1f4068;
      --active-glow: #4eedb2;
      --upcoming-accent: #66fcf1;
    }

    body {
      font-family: '-apple-system', BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #timetable-container {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
    }

    h2 {
      margin: 0 0 5px 0;
      color: var(--text-bright);
      font-size: 1.6rem;
    }

    #current-time {
      font-size: 1.1rem;
      color: var(--upcoming-accent);
      font-weight: bold;
      margin-bottom: 20px;
    }

    #classes-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .class-card {
      padding: 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      border-left: 6px solid transparent;
      transition: all 0.3s ease;
    }

    /* Active Class Frame */
    .active-class {
      background: var(--active-accent);
      border-left-color: var(--active-glow);
      transform: scale(1.01);
    }

    .status-badge {
      font-weight: 800;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 4px;
    }
    
    .active-class .status-badge { color: var(--active-glow); }
    .upcoming-class .status-badge { color: var(--upcoming-accent); }

    /* Past Class Frame */
    .past-class {
      opacity: 0.2;
      filter: grayscale(80%);
    }

    .upcoming-class {
      border-left-color: rgba(102, 252, 241, 0.3);
    }

    .class-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-bright);
    }

    .class-time {
      font-size: 0.9rem;
      margin-top: 4px;
      color: #9fedff;
    }

    .countdown {
      font-size: 0.85rem;
      margin-top: 6px;
      font-style: italic;
      opacity: 0.9;
    }

    .no-classes {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-main);
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <div id="timetable-container">
    <h2 id="current-day">Syncing...</h2>
    <div id="current-time">00:00:00</div>
    <div id="classes-list">
      <div class="no-classes">Connecting to Firebase...</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    // SWAP THIS OUT WITH YOUR REAL DB URL:
    const firebaseConfig = {
      databaseURL: "https://YOUR_PROJECT_ID.firebaseio.com/"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    const timetableRef = ref(database, 'timetable');
    get(timetableRef).then((snapshot) => {
      if (snapshot.exists()) {
        const fullSchedule = snapshot.val();
        
        // Dynamic iteration frame
        updateDashboard(fullSchedule);
        setInterval(() => updateDashboard(fullSchedule), 1000);
      } else {
        document.getElementById('classes-list').innerHTML = "<div class='no-classes'>❌ No database data match structure rules.</div>";
      }
    }).catch((e) => {
      document.getElementById('classes-list').innerHTML = "<div class='no-classes'>❌ Engine connection crash. check token.</div>";
    });

    function updateDashboard(schedule) {
      const now = new Date();
      
      // Render system date/time configurations
      document.getElementById('current-time').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const currentDay = days[now.getDay()];
      document.getElementById('current-day').innerText = currentDay;

      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const currentTimeString = `${hours}:${minutes}`;

      const todaysClasses = schedule[currentDay];
      const listContainer = document.getElementById('classes-list');
      listContainer.innerHTML = '';

      if (!todaysClasses || Object.keys(todaysClasses).length === 0) {
        listContainer.innerHTML = "<div class='no-classes'>No classes today. Rest up! 🌴</div>";
        return;
      }

      // Loop through the daily layout explicitly tracking spell keys
      Object.keys(todaysClasses).forEach(key => {
        const item = todaysClasses[key];
        const card = document.createElement('div');
        card.className = 'class-card';

        const classStartMinutes = parseTimeToMinutes(item.start);
        const classEndMinutes = parseTimeToMinutes(item.end);
        const currentMinutes = (now.getHours() * 60) + now.getMinutes();

        if (currentTimeString >= item.start && currentTimeString <= item.end) {
          // Inside Spell
          const remaining = classEndMinutes - currentMinutes;
          card.classList.add('active-class');
          card.innerHTML = `
            <div class="status-badge">🚨 Now</div>
            <div class="class-title">${item.name}</div>
            <div class="class-time">${format12Hour(item.start)} - ${format12Hour(item.end)}</div>
            <div class="countdown">Ends in ${remaining} min${remaining > 1 ? 's' : ''}</div>
          `;
        } else if (currentTimeString > item.end) {
          // Ended Spell
          card.classList.add('past-class');
          card.innerHTML = `
            <div class="class-title">${item.name}</div>
            <div class="class-time">Finished</div>
          `;
        } else {
          // Upcoming Spell
          const untilStart = classStartMinutes - currentMinutes;
          let countdownText = `Starts in ${untilStart} min${untilStart > 1 ? 's' : ''}`;
          if (untilStart > 60) {
            const h = Math.floor(untilStart / 60);
            const m = untilStart % 60;
            countdownText = `Starts in ${h}h ${m}m`;
          }

          card.classList.add('upcoming-class');
          card.innerHTML = `
            <div class="status-badge">Up Next</div>
            <div class="class-title">${item.name}</div>
            <div class="class-time">Starts at ${format12Hour(item.start)}</div>
            <div class="countdown">${countdownText}</div>
          `;
        }
        listContainer.appendChild(card);
      });
    }

    function parseTimeToMinutes(timeStr) {
      const [h, m] = timeStr.split(':').map(Number);
      return (h * 60) + m;
    }

    function format12Hour(timeStr) {
      const [h, m] = timeStr.split(':');
      let hour = parseInt(h);
      const ampm = hour >= 12 ? 'pm' : 'am';
      hour = hour % 12 || 12;
      return `${hour}:${m}${ampm}`;
    }
  </script>
</body>
</html>
