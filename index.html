<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>School Dashboard</title>
  <style>
    :root {
      --bg-color: #0b0c10;
      --card-bg: #1f2833;
      --text-main: #c5c6c7;
      --text-bright: #ffffff;
      --active-accent: #1f4068;
      --active-glow: #4eedb2;
      --upcoming-accent: #66fcf1;
    }

    body {
      font-family: '-apple-system', BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #timetable-container {
      width: 100%;
      max-width: 420px;
      background: var(--card-bg);
      padding: 20px;
      border-radius: 20px;
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
    }

    h2 {
      margin: 0 0 5px 0;
      color: var(--text-bright);
      font-size: 1.6rem;
    }

    #current-time {
      font-size: 1.1rem;
      color: var(--upcoming-accent);
      font-weight: bold;
      margin-bottom: 20px;
    }

    #classes-list {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .class-card {
      padding: 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      border-left: 6px solid transparent;
      transition: all 0.3s ease;
      position: relative;
    }

    .active-class {
      background: var(--active-accent);
      border-left-color: var(--active-glow);
      transform: scale(1.01);
    }

    .status-badge {
      font-weight: 800;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      margin-bottom: 4px;
    }
    
    .active-class .status-badge { color: var(--active-glow); }
    .upcoming-class .status-badge { color: var(--upcoming-accent); }

    .past-class {
      opacity: 0.2;
      filter: grayscale(80%);
    }

    .upcoming-class {
      border-left-color: rgba(102, 252, 241, 0.3);
    }

    .class-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-bright);
    }

    .class-time {
      font-size: 0.9rem;
      margin-top: 4px;
      color: #9fedff;
    }

    .class-room {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255, 255, 255, 0.1);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: bold;
      color: var(--text-bright);
    }

    .active-class .class-room {
      background: rgba(78, 237, 178, 0.2);
      color: var(--active-glow);
    }

    .countdown {
      font-size: 0.85rem;
      margin-top: 6px;
      font-style: italic;
      opacity: 0.9;
    }

    .no-classes {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-main);
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <div id="timetable-container">
    <h2 id="current-day">Syncing...</h2>
    <div id="current-time">00:00:00</div>
    <div id="classes-list">
      <div class="no-classes">Connecting to Firebase...</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    // SWAP THIS OUT WITH YOUR REAL DB URL:
const firebaseConfig = {
  apiKey: "AIzaSyA1cOfZneI_ss-QmQCkZostIQngpQ_JbtE",
  authDomain: "to-do-list-2fbf9.firebaseapp.com",
  databaseURL: "https://to-do-list-2fbf9-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "to-do-list-2fbf9",
  storageBucket: "to-do-list-2fbf9.firebasestorage.app",
  messagingSenderId: "712067178045",
  appId: "1:712067178045:web:e4091b51ce4b8fb1d69454"
};

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    const timetableRef = ref(database, 'timetable');
    get(timetableRef).then((snapshot) => {
      if (snapshot.exists()) {
        const fullSchedule = snapshot.val();
        
        updateDashboard(fullSchedule);
        setInterval(() => updateDashboard(fullSchedule), 1000);
      } else {
        document.getElementById('classes-list').innerHTML = "<div class='no-classes'>❌ No database data match structure rules.</div>";
      }
    }).catch((e) => {
      document.getElementById('classes-list').innerHTML = "<div class='no-classes'>❌ Engine connection crash.</div>";
    });

    function updateDashboard(schedule) {
      const now = new Date();
      
      document.getElementById('current-time').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const currentDay = days[now.getDay()];
      document.getElementById('current-day').innerText = currentDay;

      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const currentTimeString = `${hours}:${minutes}`;

      const todaysClasses = schedule[currentDay];
      const listContainer = document.getElementById('classes-list');
      listContainer.innerHTML = '';

      if (!todaysClasses || Object.keys(todaysClasses).length === 0) {
        listContainer.innerHTML = "<div class='no-classes'>No classes today. Rest up! 🌴</div>";
        return;
      }

      Object.keys(todaysClasses).forEach(key => {
        const item = todaysClasses[key];
        const card = document.createElement('div');
        card.className = 'class-card';

        // Normalize time variables ensuring 24h safety strings (e.g. "9:55" -> "09:55")
        const safeStart = padTimeStr(item.start);
        const safeEnd = padTimeStr(item.end);

        const classStartMinutes = parseTimeToMinutes(safeStart);
        const classEndMinutes = parseTimeToMinutes(safeEnd);
        const currentMinutes = (now.getHours() * 60) + now.getMinutes();

        // Optional UI room location text engine values
        const roomBadge = item.room ? `<div class="class-room">${item.room}</div>` : '';

        if (currentTimeString >= safeStart && currentTimeString <= safeEnd) {
          const remaining = classEndMinutes - currentMinutes;
          card.classList.add('active-class');
          card.innerHTML = `
            <div class="status-badge">🚨 Now</div>
            <div class="class-title">${item.name}</div>
            <div class="class-time">${format12Hour(safeStart)} - ${format12Hour(safeEnd)}</div>
            ${roomBadge}
            <div class="countdown">Ends in ${remaining} min${remaining > 1 ? 's' : ''}</div>
          `;
        } else if (currentTimeString > safeEnd) {
          card.classList.add('past-class');
          card.innerHTML = `
            <div class="class-title">${item.name}</div>
            <div class="class-time">Finished</div>
            ${roomBadge}
          `;
        } else {
          const untilStart = classStartMinutes - currentMinutes;
          let countdownText = `Starts in ${untilStart} min${untilStart > 1 ? 's' : ''}`;
          if (untilStart > 60) {
            const h = Math.floor(untilStart / 60);
            const m = untilStart % 60;
            countdownText = `Starts in ${h}h ${m}m`;
          }

          card.classList.add('upcoming-class');
          card.innerHTML = `
            <div class="status-badge">Up Next</div>
            <div class="class-title">${item.name}</div>
            <div class="class-time">Starts at ${format12Hour(safeStart)}</div>
            ${roomBadge}
            <div class="countdown">${countdownText}</div>
          `;
        }
        listContainer.appendChild(card);
      });
    }

    // Helper to safely pad string times ensuring mathematical comparison sorting bounds
    function padTimeStr(str) {
      const [h, m] = str.split(':');
      return `${h.padStart(2, '0')}:${m}`;
    }

    function parseTimeToMinutes(timeStr) {
      const [h, m] = timeStr.split(':').map(Number);
      return (h * 60) + m;
    }

    function format12Hour(timeStr) {
      const [h, m] = timeStr.split(':');
      let hour = parseInt(h);
      const ampm = hour >= 12 ? 'pm' : 'am';
      hour = hour % 12 || 12;
      return `${hour}:${m}${ampm}`;
    }
  </script>
</body>
</html>
