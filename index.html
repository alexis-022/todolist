<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Sync Tasks</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #00d4ff; --text: #eeeeee; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 20px; }
        .container { width: 100%; max-width: 450px; background: var(--card); padding: 25px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin-top: 0; color: var(--accent); text-align: center; }
        .input-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; outline: none; }
        input:focus { border-color: var(--accent); }
        #addBtn { padding: 10px 20px; background: var(--accent); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        #addBtn:hover { transform: scale(1.05); opacity: 0.9; }
        ul { list-style: none; padding: 0; }
        li { background: #2a2a2a; padding: 15px; margin-bottom: 10px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--accent); }
        .task-content { display: flex; flex-direction: column; }
        .timestamp { font-size: 0.7rem; color: #888; margin-top: 4px; }
        .del-btn { background: #ff4d4d; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Cloud Sync Tasks</h2>
    <div class="input-box">
        <input type="text" id="taskInput" placeholder="What's the plan?">
        <button id="addBtn">Add</button>
    </div>
    <ul id="taskList"></ul>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded, remove, onChildRemoved } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    // YOUR CONFIG
    const firebaseConfig = {
        apiKey: "AIzaSyA1cOfZneI_ss-QmQCkZostIQngpQ_JbtE",
        authDomain: "to-do-list-2fbf9.firebaseapp.com",
        databaseURL: "https://to-do-list-2fbf9-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "to-do-list-2fbf9",
        storageBucket: "to-do-list-2fbf9.firebasestorage.app",
        messagingSenderId: "712067178045",
        appId: "1:712067178045:web:e4091b51ce4b8fb1d69454"
    };

    // Init
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const todoRef = ref(db, 'tasks');

    const input = document.getElementById('taskInput');
    const btn = document.getElementById('addBtn');
    const list = document.getElementById('taskList');

    // ADD TASK
    btn.onclick = async () => {
        const text = input.value.trim();
        if (text !== "") {
            try {
                await push(todoRef, {
                    text: text,
                    timestamp: Date.now() // Standard JS timestamp
                });
                input.value = "";
            } catch (e) {
                console.error("Error adding task:", e);
                alert("Failed to add task. Check your Firebase Rules!");
            }
        }
    };

    // RENDER TASK
    onChildAdded(todoRef, (snapshot) => {
        const data = snapshot.val();
        const key = snapshot.key;
        
        // Convert timestamp to readable format
        const dateObj = data.timestamp ? new Date(data.timestamp) : new Date();
        const timeStr = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const dateStr = dateObj.toLocaleDateString();

        const li = document.createElement('li');
        li.id = key;
        li.innerHTML = `
            <div class="task-content">
                <span>${data.text}</span>
                <span class="timestamp">${dateStr} at ${timeStr}</span>
            </div>
            <button class="del-btn" onclick="deleteTask('${key}')">Delete</button>
        `;
        list.appendChild(li);
    });

    // SYNC DELETION
    onChildRemoved(todoRef, (snapshot) => {
        const item = document.getElementById(snapshot.key);
        if (item) item.remove();
    });

    // GLOBAL DELETE FUNCTION
    window.deleteTask = (id) => {
        remove(ref(db, `tasks/${id}`));
    };

    // Enter Key Support
    input.onkeypress = (e) => { if(e.key === "Enter") btn.click(); };
</script>

</body>
</html>
