<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Scanner Library</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        #reader { width: 100%; max-width: 400px; background: white; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
        .book-card { background: white; padding: 15px; border-radius: 10px; margin-bottom: 10px; width: 100%; max-width: 400px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .status { font-size: 0.8rem; font-weight: bold; border-radius: 5px; padding: 3px 6px; }
        .available { background: #dcfce7; color: #166534; }
        .borrowed { background: #fee2e2; color: #991b1b; }
        button { cursor: pointer; padding: 8px; border-radius: 5px; border: none; }
        .scan-btn { background: #4f46e5; color: white; margin-bottom: 20px; width: 100%; max-width: 400px; padding: 15px; font-weight: bold; }
    </style>
</head>
<body>

    <h2>📚 ISBN Auto-Scanner</h2>
    
    <button class="scan-btn" id="startScan">Start Camera Scanner</button>
    <div id="reader" style="display:none;"></div>

    <div id="inventory" style="width: 100%; max-width: 400px;"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA1cOfZneI_ss-QmQCkZostIQngpQ_JbtE",
        authDomain: "to-do-list-2fbf9.firebaseapp.com",
        databaseURL: "https://to-do-list-2fbf9-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "to-do-list-2fbf9",
        storageBucket: "to-do-list-2fbf9.firebasestorage.app",
        messagingSenderId: "712067178045",
        appId: "1:712067178045:web:e4091b51ce4b8fb1d69454"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const libRef = ref(db, 'library');

    // --- 1. SCANNER LOGIC ---
    const html5QrCode = new Html5Qrcode("reader");
    document.getElementById('startScan').onclick = () => {
        document.getElementById('reader').style.display = 'block';
        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 150 } },
            (decodedText) => {
                html5QrCode.stop(); // Stop camera after scan
                document.getElementById('reader').style.display = 'none';
                fetchBookInfo(decodedText);
            }
        );
    };

    // --- 2. ISBN API LOGIC ---
    async function fetchBookInfo(isbn) {
        console.log("Searching for ISBN:", isbn);
        try {
            const response = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`);
            const data = await response.json();
            const bookData = data[`ISBN:${isbn}`];

            if (bookData) {
                push(libRef, {
                    title: bookData.title,
                    author: bookData.authors ? bookData.authors[0].name : "Unknown",
                    isbn: isbn,
                    status: 'available'
                });
            } else {
                alert("Book not found in OpenLibrary database.");
            }
        } catch (err) {
            console.error("API Error:", err);
        }
    }

    // --- 3. DISPLAY LOGIC ---
    onValue(libRef, (snapshot) => {
        const inventory = document.getElementById('inventory');
        inventory.innerHTML = '<h3>Inventory</h3>';
        const data = snapshot.val();
        for (let id in data) {
            const item = data[id];
            const div = document.createElement('div');
            div.className = 'book-card';
            div.innerHTML = `
                <div>
                    <strong>${item.title}</strong><br>
                    <small>${item.author}</small>
                </div>
                <span class="status ${item.status}">${item.status}</span>
            `;
            inventory.appendChild(div);
        }
    });
</script>
</body>
</html>
