<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Playing Around</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" type="image/png" href="favicon.png?v=2">
  <link rel="shortcut icon" href="favicon.png?v=2">

  <!-- firebase start ****************************************-->
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-database.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.1.2/firebase-analytics.js"></script>
  <!-- firebase end ******************************************-->

  <script src="fb_setup.js"></script>

</head>

<body>
  <div id="mainLayout">
    <h1>Metlink (But Better)</h1>
    <div id="mainContent">
      <button onclick="fb_authenticate()" type="button" id="loginButton">Log in with Google</button>
      <!--
      <form>
        <label for="fname">First Name</label>
        <input type="text" id="fname" name="firstname" placeholder="Your name..">

        <label for="lname">Last Name</label>
        <input type="text" id="lname" name="lastname" placeholder="Your last name..">
        <button onclick="fb_writeForm()" type="button" id="submitButton">Submit</button>
      </form>
    -->
      <div id="metlinkContainer">
        <h2>Departures at:</h2>
        <select id="stationSelect"></select>
        <div id="singleDepartureContainer">
          <div id="singleDeparture" class="singleDeparture"></div>
          <div id="singleDeparture2" class="singleDeparture"></div>
          <div id="singleDeparture3" class="singleDeparture"></div>
        </div>
      </div>
      <div id="journeyPlannerContainer">
        <h2>Journey Planner</h2>
        <p>Origin: <select id="originSelect"></select></p>
        <p>Destination: <select id="destinationSelect"></select></p>
        <button onclick="journeyPlanner()" type="button" id="journeyPlannerButton">Plan Journey</button>
        <div id="journeyResult" class="singleDeparture"></div>
        <div id="journeyInfo"></div>
        <div id="journeyResult2" class="singleDeparture"></div>
        <div id="journeyInfo2"></div>
      </div>
      <div id="info"></div>
    </div>
    <div id="topBar">
      <div id="profilePhoto" onclick="getProfileInfo()">
      </div>
    </div>
  </div>
  <script src="fb_io.js"></script>
  <script src="script.js"></script>
</body>

</html>
