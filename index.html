<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Library Management</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: env(safe-area-inset-top) 15px; }
        
        /* Stats Header */
        .dashboard { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin: 20px 0; }
        .stat-card { background: var(--card); padding: 15px; border-radius: 16px; text-align: center; border: 1px solid #334155; }
        .stat-card span { display: block; font-size: 1.5rem; font-weight: 800; color: var(--primary); }
        .stat-card label { font-size: 0.7rem; opacity: 0.6; text-transform: uppercase; }

        /* Search & Actions */
        .controls { position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 10; display: flex; gap: 10px; }
        .search-box { flex: 1; background: var(--card); border: 1px solid #334155; padding: 12px 15px; border-radius: 12px; color: white; outline: none; }
        .scan-btn { background: var(--primary); border: none; padding: 12px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; }

        /* Library List */
        .book-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 100px; }
        .book-item { background: var(--card); border-radius: 16px; padding: 12px; display: flex; gap: 15px; border: 1px solid #334155; animation: slideIn 0.3s ease-out; }
        .book-cover { width: 60px; height: 90px; border-radius: 8px; object-fit: cover; background: #334155; }
        .book-info h4 { margin: 0; font-size: 1rem; color: #fff; }
        .shelf-tag { display: inline-block; font-size: 0.65rem; background: #334155; padding: 2px 8px; border-radius: 5px; margin-top: 5px; }

        /* Modal */
        #modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); z-index: 100; padding: 20px; overflow-y: auto; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 24px; max-width: 500px; margin: auto; border: 1px solid #444; }
        #timerBar { height: 4px; background: var(--primary); width: 100%; transition: width 5s linear; margin-bottom: 15px; }
        .paused { width: 100% !important; transition: none !important; background: #f59e0b !important; }

        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.7rem; color: #94a3b8; font-weight: 600; }
        input, textarea, select { background: #0f172a; border: 1px solid #334155; padding: 10px; border-radius: 8px; color: white; font-family: inherit; }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="stat-card"><span id="stat-total">0</span><label>Total</label></div>
        <div class="stat-card"><span id="stat-avail">0</span><label>Available</label></div>
        <div class="stat-card"><span id="stat-reserves">0</span><label>Reserves</label></div>
    </div>

    <div class="controls">
        <input type="text" id="search" class="search-box" placeholder="Search by Title, Author, or ISBN...">
        <button class="scan-btn" id="startScan">📷</button>
    </div>

    <div id="reader" style="display:none; width:100%; border-radius:16px; margin: 10px 0;"></div>

    <div class="book-list" id="library"></div>

    <div id="modal">
        <div class="modal-content">
            <div id="timerBar"></div>
            <h3 style="margin-top:0">Verify Asset Info</h3>
            <div class="input-grid" id="formFields"></div>
            <button class="scan-btn" id="saveBtn" style="width:100%; justify-content:center; margin-top:20px; font-weight:bold;">CONFIRM & SAVE</button>
            <button id="closeBtn" style="background:none; color:#ef4444; border:none; width:100%; margin-top:10px; cursor:pointer;">Discard Entry</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA1cOfZneI_ss-QmQCkZostIQngpQ_JbtE",
        authDomain: "to-do-list-2fbf9.firebaseapp.com",
        databaseURL: "https://to-do-list-2fbf9-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "to-do-list-2fbf9",
        storageBucket: "to-do-list-2fbf9.firebasestorage.app",
        messagingSenderId: "712067178045",
        appId: "1:712067178045:web:e4091b51ce4b8fb1d69454"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const libRef = ref(db, 'production_library');

    let allBooks = [];
    let timerId;
    let editingId = null;

    const fields = [
        "title", "author", "isbn", "publishDate", "publisher", "pageCount", 
        "language", "genre", "seriesInfo", "format", "locationInLibrary", 
        "numCopies", "damageNotes", "ratings", "currentUser", "lastUser", "summary", "reviews", "reservesPlaced"
    ];

    // Generate Form
    const form = document.getElementById('formFields');
    fields.forEach(f => {
        const div = document.createElement('div');
        div.className = 'input-group';
        div.innerHTML = `<label>${f.replace(/([A-Z])/g, ' $1').toUpperCase()}</label><input id="f-${f}" class="lib-input">`;
        form.appendChild(div);
    });

    // Timer Pause on Input
    document.querySelectorAll('.lib-input').forEach(el => {
        el.onfocus = () => { clearTimeout(timerId); document.getElementById('timerBar').classList.add('paused'); };
    });

    // Scanner logic
    const scanner = new Html5Qrcode("reader");
    document.getElementById('startScan').onclick = () => {
        const r = document.getElementById('reader');
        r.style.display = 'block';
        scanner.start({ facingMode: "environment" }, { fps: 15 }, (isbn) => {
            scanner.stop(); r.style.display = 'none';
            fetchBook(isbn);
        });
    };

    async function fetchBook(isbn) {
        const res = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`);
        const data = await res.json();
        const b = data[`ISBN:${isbn}`] || {};
        
        const book = {
            title: b.title || "Nil",
            author: b.authors ? b.authors[0].name : "Nil",
            isbn: isbn,
            publishDate: b.publish_date || "Nil",
            publisher: b.publishers ? b.publishers[0].name : "Nil",
            pageCount: b.number_of_pages || 0,
            language: b.languages ? b.languages[0].name : "English",
            genre: b.subjects ? b.subjects[0].name : "Fiction",
            seriesInfo: b.series ? b.series[0].name : "Nil",
            format: "Hardcover",
            locationInLibrary: "General",
            numCopies: 1,
            damageNotes: "None",
            ratings: "Nil",
            currentUser: "None",
            lastUser: "Nil",
            summary: b.notes || "No summary",
            reviews: "Nil",
            reservesPlaced: 0,
            coverImage: b.cover ? b.cover.large : ""
        };

        openModal(book);
        document.getElementById('timerBar').classList.remove('paused');
        timerId = setTimeout(saveBook, 5000);
    }

    function openModal(book, id = null) {
        editingId = id;
        fields.forEach(f => document.getElementById(`f-${f}`).value = book[f]);
        window.currentCover = book.coverImage;
        document.getElementById('modal').style.display = 'block';
    }

    function saveBook() {
        const data = { coverImage: window.currentCover };
        fields.forEach(f => data[f] = document.getElementById(`f-${f}`).value);
        
        if (editingId) update(ref(db, `production_library/${editingId}`), data);
        else push(libRef, data);
        
        closeModal();
    }

    function closeModal() {
        clearTimeout(timerId);
        document.getElementById('modal').style.display = 'none';
        editingId = null;
    }

    document.getElementById('saveBtn').onclick = saveBook;
    document.getElementById('closeBtn').onclick = closeModal;

    // --- SORTING ENGINE ---
    function getShelfSortValue(book) {
        const genre = (book.genre || "").toLowerCase();
        // Check if Non-Fiction (Contains Dewey-like tags or explicit Non-Fiction label)
        const isNonFiction = genre.includes('science') || genre.includes('history') || genre.includes('non-fiction');
        
        if (isNonFiction) {
            // Placeholder: In real production, you'd map subjects to Dewey decimals
            return `1-${book.genre}-${book.title}`; 
        } else {
            // Fiction: Author Last Name + Title
            const nameParts = book.author.split(' ');
            const lastName = nameParts[nameParts.length - 1];
            return `0-${lastName}-${book.title}`;
        }
    }

    onValue(libRef, (snap) => {
        const data = snap.val() || {};
        allBooks = Object.entries(data).map(([id, val]) => ({ id, ...val }));
        
        // Sorting Logic
        allBooks.sort((a, b) => getShelfSortValue(a).localeCompare(getShelfSortValue(b)));
        
        render(allBooks);
        updateStats(allBooks);
    });

    function render(list) {
        const container = document.getElementById('library');
        container.innerHTML = '';
        list.forEach(b => {
            const card = document.createElement('div');
            card.className = 'book-item';
            card.onclick = () => {
                openModal(b, b.id);
                document.getElementById('timerBar').classList.add('paused');
            };
            card.innerHTML = `
                <img src="${b.coverImage}" class="book-cover">
                <div class="book-info">
                    <h4>${b.title}</h4>
                    <small>${b.author}</small><br>
                    <span class="shelf-tag">📍 ${b.locationInLibrary}</span>
                    <span class="shelf-tag">📑 ${b.isbn}</span>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function updateStats(list) {
        document.getElementById('stat-total').innerText = list.length;
        document.getElementById('stat-avail').innerText = list.filter(b => b.currentUser === "None").length;
        document.getElementById('stat-reserves').innerText = list.reduce((acc, b) => acc + parseInt(b.reservesPlaced || 0), 0);
    }

    document.getElementById('search').oninput = (e) => {
        const t = e.target.value.toLowerCase();
        const filtered = allBooks.filter(b => 
            b.title.toLowerCase().includes(t) || b.author.toLowerCase().includes(t) || b.isbn.includes(t)
        );
        render(filtered);
    };
</script>
</body>
</html>
