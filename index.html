<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personal Dashboard</title>
  
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2366fcf1' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='3' y='4' width='18' height='18' rx='2' ry='2'%3E%3C/rect%3E%3Cline x1='16' y1='2' x2='16' y2='6'%3E%3C/line%3E%3Cline x1='8' y1='2' x2='8' y2='6'%3E%3C/line%3E%3Cline x1='3' y1='10' x2='21' y2='10'%3E%3C/line%3E%3C/svg%3E">

  <style>
    :root {
      --bg-color: #0b0c10;
      --card-bg: #1f2833;
      --text-main: #c5c6c7;
      --text-bright: #ffffff;
      --active-accent: #151d2a;
      --active-glow: #4eedb2;
      --upcoming-accent: #66fcf1;
      --break-accent: #ffb703;

      /* Subject Custom Colors Variables */
      --color-calculus: #98ff98;
      --color-physics: #3a86ff;
      --color-economics: #800020;
      --color-history: #ffbe0b;
      --color-english: #ffffff;
      --color-default: #66fcf1;
    }

    body {
      font-family: '-apple-system', BlinkMacSystemFont, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 30px 15px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      box-sizing: border-box;
    }

    /* Master Dashboard Workspace Grid Wrapper */
    .dashboard-grid {
      display: grid;
      grid-template-columns: minmax(320px, 440px) minmax(320px, 440px);
      gap: 30px;
      width: 100%;
      max-width: 940px;
      justify-content: center;
    }

    @media (max-width: 820px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
        max-width: 440px;
      }
    }

    /* Individual Container Blueprint Blocks */
    .dashboard-panel {
      background: var(--card-bg);
      padding: 25px;
      border-radius: 24px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.6);
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      width: 100%;
    }

    .header-section {
      text-align: center;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      padding-bottom: 15px;
    }

    h2 {
      margin: 0 0 5px 0;
      color: var(--text-bright);
      font-size: 1.8rem;
      letter-spacing: -0.5px;
    }

    #lookahead-note {
      font-size: 0.85rem;
      color: var(--upcoming-accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 5px;
      display: none;
    }

    #current-time {
      font-size: 1.2rem;
      color: var(--upcoming-accent);
      font-weight: bold;
    }

    #classes-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 60vh;
      overflow-y: auto;
      padding: 6px 8px; 
      box-sizing: border-box;
    }

    #classes-list::-webkit-scrollbar {
      width: 4px;
    }
    #classes-list::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 2px;
    }

    .class-card {
      padding: 16px;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.03);
      border-left: 6px solid var(--subject-color, var(--default-color));
      position: relative;
      scroll-margin: 10px;
      box-sizing: border-box;
      width: 100%;
    }

    /* PAST CLASSES */
    .past-class {
      opacity: 0.15;
      filter: grayscale(100%);
      padding: 10px 14px;
      font-size: 0.95rem;
    }
    .past-class .class-title { font-size: 1rem; font-weight: 500; }
    .past-class .class-room { top: 10px; font-size: 0.7rem; }

    /* ACTIVE HERO CLASS */
    .active-class {
      background: var(--active-accent);
      border-left-color: var(--subject-color) !important;
      padding: 20px;
      margin: 14px 0; 
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
    }
    .active-class .class-title {
      font-size: 1.5rem;
      color: var(--text-bright);
      margin-top: 4px;
    }
    .active-class .class-time {
      font-size: 0.95rem;
      color: #9fedff;
      margin-top: 4px;
    }

    .active-header-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .canvas-ring-inline {
      width: 16px;
      height: 16px;
      display: block;
    }

    .upcoming-class { border-left-color: var(--subject-color); }

    .status-badge {
      font-weight: 800;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.2px;
    }
    .active-class .status-badge { color: var(--subject-color); }
    .upcoming-class .status-badge { color: var(--subject-color); margin-bottom: 6px;}

    .class-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-bright);
      word-wrap: break-word;
    }

    .class-time {
      font-size: 0.9rem;
      margin-top: 4px;
      color: var(--text-main);
    }

    .class-room {
      position: absolute;
      top: 16px;
      right: 16px;
      background: rgba(255, 255, 255, 0.08);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-weight: bold;
      color: var(--text-bright);
    }

    .countdown {
      font-size: 0.85rem;
      margin-top: 8px;
      font-style: italic;
      color: var(--text-main);
      opacity: 0.8;
      font-weight: 500;
    }

    .no-classes, .weather-status-message {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-main);
      font-size: 1.1rem;
    }

    .week-btn {
      margin-top: 25px;
      background: transparent;
      border: 1px solid var(--upcoming-accent);
      color: var(--upcoming-accent);
      padding: 12px;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.95rem;
    }
    .week-btn:hover { background: rgba(102, 252, 241, 0.1); }

    /* --- WEATHER HUB STYLES --- */
    .weather-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .weather-main-display {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 18px;
      padding: 20px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .weather-temp {
      font-size: 3.5rem;
      font-weight: 800;
      color: var(--text-bright);
      line-height: 1;
    }

    .weather-condition {
      font-size: 1.2rem;
      color: var(--upcoming-accent);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .weather-meta-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .weather-meta-card {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.04);
      padding: 14px;
      border-radius: 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .weather-meta-label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-main);
      opacity: 0.7;
    }

    .weather-meta-val {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-bright);
    }

    .forecast-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
    }

    .forecast-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255, 255, 255, 0.01);
      padding: 12px 16px;
      border-radius: 12px;
      border-left: 4px solid var(--upcoming-accent);
    }

    .forecast-day {
      font-weight: 600;
      color: var(--text-bright);
    }

    .forecast-meta {
      font-size: 0.9rem;
      color: var(--text-main);
      text-align: right;
    }

    /* FULL WEEK MODAL OVERLAY */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(11, 12, 16, 0.95);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: none;
      justify-content: flex-start;
      align-items: flex-start;
      overflow: auto; 
      padding: 40px 20px;
      box-sizing: border-box;
    }
    .modal-content {
      background: var(--card-bg);
      width: 100%;
      max-width: 1100px;
      border-radius: 20px;
      padding: 25px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      position: relative;
      box-sizing: border-box;
      margin: 0 auto;
    }
    .close-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(255,255,255,0.05);
      border: none;
      color: var(--text-bright);
      font-size: 1.2rem;
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
    }
    .close-btn:hover { background: rgba(255,255,255,0.15); }
    
    .grid-container {
      display: grid;
      grid-template-columns: repeat(7, minmax(135px, 1fr));
      gap: 10px;
      margin-top: 25px;
    }
    @media (max-width: 980px) {
      .grid-container {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }
    }
    .day-column {
      background: rgba(255,255,255,0.02);
      border-radius: 12px;
      padding: 10px;
      box-sizing: border-box;
    }
    .day-header {
      text-align: center;
      font-weight: bold;
      color: var(--upcoming-accent);
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 8px;
      margin-bottom: 10px;
    }
    .mini-card {
      background: rgba(255,255,255,0.04);
      padding: 8px;
      border-radius: 8px;
      margin-bottom: 8px;
      font-size: 0.8rem;
      border-left: 3px solid var(--subject-color, var(--upcoming-accent));
      position: relative;
      box-sizing: border-box;
    }
    .mini-title { font-weight: bold; color: var(--text-bright); margin-bottom: 2px; word-wrap: break-word;}
    .mini-meta { color: #888; font-size: 0.75rem; }
  </style>
</head>
<body>

  <div class="dashboard-grid">
    
    <div class="dashboard-panel">
      <div class="header-section">
        <div id="lookahead-note">Tomorrow's Schedule Preview</div>
        <h2 id="current-day">Syncing...</h2>
        <div id="current-time">00:00:00</div>
      </div>
      <div id="classes-list">
        <div class="no-classes">Connecting to Realtime Hub...</div>
      </div>
      <button class="week-btn" id="open-week-btn">View Full Week Timetable</button>
    </div>

    <div class="dashboard-panel">
      <div class="header-section">
        <div style="font-size: 0.85rem; color: var(--upcoming-accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 5px;">Environment Metrics</div>
        <h2>Local Weather</h2>
        <div style="font-size: 0.9rem; opacity: 0.6; font-style: italic;" id="weather-location-label">Wellington Region</div>
      </div>
      
      <div id="weather-injection-point">
        <div class="weather-status-message">Connecting to Open-Meteo satellite grid...</div>
      </div>
    </div>

  </div>

  <div class="modal-overlay" id="week-modal">
    <div class="modal-content">
      <button class="close-btn" id="close-week-btn">Close</button>
      <h2 style="margin-bottom: 5px;">Weekly Rotation Grid</h2>
      <span style="color: var(--upcoming-accent); font-size: 0.9rem;">Master Schedule View</span>
      <div class="grid-container" id="modal-grid-target"></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA1cOfZneI_ss-QmQCkZostIQngpQ_JbtE",
      authDomain: "to-do-list-2fbf9.firebaseapp.com",
      databaseURL: "https://to-do-list-2fbf9-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "to-do-list-2fbf9",
      storageBucket: "to-do-list-2fbf9.firebasestorage.app",
      messagingSenderId: "712067178045",
      appId: "1:712067178045:web:e4091b51ce4b8fb1d69454"
    };

    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    let globalScheduleCache = null;
    let hasInitiallyAnchored = false; 

    const timetableRef = ref(database, 'timetable');
    get(timetableRef).then((snapshot) => {
      if (snapshot.exists()) {
        globalScheduleCache = snapshot.val();
        
        updateDashboard(globalScheduleCache);
        buildWeekModalGrid(globalScheduleCache);
        setInterval(() => updateDashboard(globalScheduleCache), 1000);
      } else {
        document.getElementById('classes-list').innerHTML = "<div class='no-classes'>No database data found matching requirements.</div>";
      }
    }).catch((e) => {
      console.error(e);
      document.getElementById('classes-list').innerHTML = "<div class='no-classes'>Database connection failure.</div>";
    });

    // --- CODESET MAPPER FOR WEATHER CONDITIONAL STRINGS ---
    function getWeatherInterpretation(code) {
      const mapping = {
        0: "Clear Sky",
        1: "Mainly Clear", 2: "Partly Cloudy", 3: "Overcast",
        45: "Foggy", 48: "Depositing Rime Fog",
        51: "Light Drizzle", 53: "Moderate Drizzle", 55: "Dense Drizzle",
        61: "Slight Rain", 63: "Moderate Rain", 65: "Heavy Rain",
        71: "Slight Snow", 73: "Moderate Snow", 75: "Heavy Snow",
        80: "Slight Rain Showers", 81: "Moderate Rain Showers", 82: "Violent Rain Showers",
        95: "Thunderstorm", 96: "Thunderstorm with Hail"
      };
      return mapping[code] || "Variable Conditions";
    }

    // --- LIVE NATIVE WEATHER PARSER ENGINE (CORS-FREE) ---
    function fetchLiveLocalWeather() {
      const targetContainer = document.getElementById('weather-injection-point');
      
      // Fixed Coordinates for Lower Hutt, Wellington Region
      const lat = "-41.2092";
      const lon = "174.9081";
      const apiUrl = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,weather_code,wind_speed_10m&daily=weather_code,temperature_2m_max,temperature_2m_min&timezone=Pacific%2FAuckland`;

      fetch(apiUrl)
        .then(res => {
          if (!res.ok) throw new Error("Weather service status anomaly");
          return res.json();
        })
        .then(data => {
          const current = data.current;
          const daily = data.daily;
          
          const conditionText = getWeatherInterpretation(current.weather_code);
          const currentTemp = Math.round(current.temperature_2m);
          const feelsLike = Math.round(current.apparent_temperature);
          const humidity = current.relative_humidity_2m;
          const windSpeed = Math.round(current.wind_speed_10m);

          // Build out structural layout cleanly inside target panel container
          let forecastHtml = '';
          const daysOfWeek = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
          
          // Generate upcoming 3 days prediction block loop
          for(let i = 1; i <= 3; i++) {
            const fDate = new Date(daily.time[i]);
            const dayName = daysOfWeek[fDate.getDay()];
            const fCondition = getWeatherInterpretation(daily.weather_code[i]);
            const maxT = Math.round(daily.temperature_2m_max[i]);
            const minT = Math.round(daily.temperature_2m_min[i]);

            forecastHtml += `
              <div class="forecast-item">
                <div class="forecast-day">${dayName}</div>
                <div class="forecast-meta">
                  <div style="color: var(--text-bright); font-weight:600;">${fCondition}</div>
                  <div style="font-size:0.8rem; opacity:0.8;">High: ${maxT}°C | Low: ${minT}°C</div>
                </div>
              </div>
            `;
          }

          targetContainer.innerHTML = `
            <div class="weather-container">
              <div class="weather-main-display">
                <div class="weather-temp">${currentTemp}°C</div>
                <div class="weather-condition">${conditionText}</div>
              </div>
              
              <div class="weather-meta-grid">
                <div class="weather-meta-card">
                  <span class="weather-meta-label">Feels Like</span>
                  <span class="weather-meta-val">${feelsLike}°C</span>
                </div>
                <div class="weather-meta-card">
                  <span class="weather-meta-label">Humidity</span>
                  <span class="weather-meta-val">${humidity}%</span>
                </div>
                <div class="weather-meta-card">
                  <span class="weather-meta-label">Wind Velocity</span>
                  <span class="weather-meta-val">${windSpeed} km/h</span>
                </div>
                <div class="weather-meta-card">
                  <span class="weather-meta-label">Station Region</span>
                  <span class="weather-meta-val">Lower Hutt</span>
                </div>
              </div>

              <div style="margin-top: 10px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; color: var(--upcoming-accent); font-weight:bold;">
                3-Day Outlook Trend
              </div>
              <div class="forecast-row">
                ${forecastHtml}
              </div>
            </div>
          `;
        })
        .catch(err => {
          console.error(err);
          targetContainer.innerHTML = "<div class='weather-status-message'>Unable to verify local weather streaming context. Retrying...</div>";
        });
    }

    // Trigger instant evaluation and update telemetry loop sequence every 15 minutes
    fetchLiveLocalWeather();
    setInterval(fetchLiveLocalWeather, 900000);

    function getSubjectColor(subjectName) {
      if (!subjectName) return '#66fcf1';
      const name = subjectName.toLowerCase();
      
      if (name.includes('calc') || name.includes('math')) return '#98ff98'; 
      if (name.includes('phys')) return '#3a86ff'; 
      if (name.includes('econ')) return '#800020'; 
      if (name.includes('hist')) return '#ffbe0b'; 
      if (name.includes('engl') || name.includes('lit')) return '#ffffff'; 
      
      if (name.includes('lunch') || name.includes('interval') || name.includes('break')) return '#ffb703'; 
      return '#66fcf1'; 
    }

    function updateDashboard(schedule) {
      const now = new Date();
      document.getElementById('current-time').innerText = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      
      const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      let targetDay = days[now.getDay()];
      
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const currentTimeString = `${hours}:${minutes}`;

      let currentDayClasses = schedule[targetDay];
      
      let isDayFinished = false;
      if (currentDayClasses && Object.keys(currentDayClasses).length > 0) {
        const sortedToday = Object.values(currentDayClasses).sort((a, b) => padTimeStr(a.start).localeCompare(padTimeStr(b.start)));
        const lastClassEnd = padTimeStr(sortedToday[sortedToday.length - 1].end);
        if (currentTimeString > lastClassEnd) {
          isDayFinished = true;
        }
      }

      const lookaheadNote = document.getElementById('lookahead-note');
      if (!currentDayClasses || Object.keys(currentDayClasses).length === 0 || isDayFinished) {
        let lookaheadIndex = 1;
        let foundNextDay = false;
        
        while (lookaheadIndex <= 7) {
          const nextDayCheck = days[(now.getDay() + lookaheadIndex) % 7];
          if (schedule[nextDayCheck] && Object.keys(schedule[nextDayCheck]).length > 0) {
            targetDay = nextDayCheck;
            foundNextDay = true;
            break;
          }
          lookaheadIndex++;
        }
        
        if (foundNextDay) {
          lookaheadNote.style.display = 'block';
          lookaheadNote.innerText = `${targetDay} Schedule Preview`;
        } else {
          lookaheadNote.style.display = 'none';
        }
      } else {
        lookaheadNote.style.display = 'none';
      }

      document.getElementById('current-day').innerText = targetDay;
      const targetDayClasses = schedule[targetDay];
      const listContainer = document.getElementById('classes-list');
      listContainer.innerHTML = '';

      if (!targetDayClasses || Object.keys(targetDayClasses).length === 0) {
        listContainer.innerHTML = "<div class='no-classes'>No events scheduled.</div>";
        return;
      }

      const sortedClasses = Object.values(targetDayClasses).sort((a, b) => {
        return padTimeStr(a.start).localeCompare(padTimeStr(b.start));
      });

      let pastStack = [];
      let activeItem = null;
      let upcomingStack = [];
      const currentMinutes = (now.getHours() * 60) + now.getMinutes();

      sortedClasses.forEach(item => {
        if (lookaheadNote.style.display === 'block') {
          upcomingStack.push({ ...item, type: 'UPCOMING' });
        } else {
          const safeStart = padTimeStr(item.start);
          const safeEnd = padTimeStr(item.end);

          if (currentTimeString >= safeStart && currentTimeString <= safeEnd) {
            activeItem = { ...item, type: 'ACTIVE' };
          } else if (currentTimeString > safeEnd) {
            const endMins = parseTimeToMinutes(safeEnd);
            if ((currentMinutes - endMins) <= 120) {
              pastStack.push({ ...item, type: 'PAST' });
            }
          } else {
            upcomingStack.push({ ...item, type: 'UPCOMING' });
          }
        }
      });

      // Render Historical Elements
      pastStack.forEach(item => {
        const card = document.createElement('div');
        const color = getSubjectColor(item.name);
        card.className = 'class-card past-class';
        card.style.setProperty('--subject-color', color);
        const roomBadge = item.room ? `<div class="class-room">${item.room}</div>` : '';
        card.innerHTML = `
          <div class="class-title">${item.name}</div>
          ${roomBadge}
        `;
        listContainer.appendChild(card);
      });

      let activeCardElement = null;
      let renderCanvasCallback = null;

      if (activeItem) {
        const card = document.createElement('div');
        card.className = 'class-card active-class';
        activeCardElement = card;
        
        const safeStart = padTimeStr(activeItem.start);
        const safeEnd = padTimeStr(activeItem.end);
        const color = getSubjectColor(activeItem.name);
        card.style.setProperty('--subject-color', color);
        
        const lowerName = activeItem.name.toLowerCase();
        let labelText = "Now In Progress";

        if (lowerName.includes('lunch') || lowerName.includes('interval') || lowerName.includes('break')) {
          labelText = "Break Period";
        }

        const startMin = parseTimeToMinutes(safeStart);
        const endMin = parseTimeToMinutes(safeEnd);
        const remaining = endMin - currentMinutes;
        
        const totalDuration = endMin - startMin;
        const elapsed = currentMinutes - startMin;
        const progressPercent = Math.min(Math.max(elapsed / totalDuration, 0), 1);

        card.innerHTML = `
          <div class="active-header-row">
            <div class="status-badge">${labelText}</div>
            <canvas id="active-progress-ring" class="canvas-ring-inline" width="32" height="32"></canvas>
          </div>
          <div class="class-title">${activeItem.name}</div>
          <div class="class-time">${format12Hour(safeStart)} - ${format12Hour(safeEnd)}</div>
          ${activeItem.room ? `<div class="class-room">${activeItem.room}</div>` : ''}
          <div class="countdown">Ends in ${remaining} min${remaining > 1 ? 's' : ''}</div>
        `;

        renderCanvasCallback = () => {
          const canvas = document.getElementById('active-progress-ring');
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          ctx.clearRect(0, 0, 32, 32);
          
          ctx.beginPath();
          ctx.arc(16, 16, 13, 0, 2 * Math.PI);
          ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)';
          ctx.lineWidth = 3;
          ctx.stroke();

          ctx.beginPath();
          ctx.arc(16, 16, 13, -0.5 * Math.PI, (-0.5 * Math.PI) + (2 * Math.PI * progressPercent));
          ctx.strokeStyle = color;
          ctx.lineWidth = 3;
          ctx.lineCap = 'round';
          ctx.stroke();
        };

        listContainer.appendChild(card);
        if (renderCanvasCallback) renderCanvasCallback();
      }

      // Render Trailing Future Cards
      upcomingStack.forEach((item, index) => {
        const card = document.createElement('div');
        const color = getSubjectColor(item.name);
        const safeStart = padTimeStr(item.start);
        const roomBadge = item.room ? `<div class="class-room">${item.room}</div>` : '';
        
        let countdownElementText = '';
        if (lookaheadNote.style.display === 'none') {
          const untilStart = parseTimeToMinutes(safeStart) - currentMinutes;
          let countdownText = `${untilStart} min`;
          if (untilStart > 60) {
            countdownText = `${Math.floor(untilStart / 60)}h ${untilStart % 60}m`;
          }
          countdownElementText = `<div class="countdown">In ${countdownText}</div>`;
        }

        if (!activeItem && index === 0) {
          card.className = 'class-card active-class'; 
          card.style.setProperty('--subject-color', color);
          card.innerHTML = `
            <div class="status-badge">Up Next Focus</div>
            <div class="class-title">${item.name}</div>
            <div class="class-time">Starts at ${format12Hour(safeStart)}</div>
            ${item.room ? `<div class="class-room">${item.room}</div>` : ''}
            ${countdownElementText}
          `;
          activeCardElement = card; 
        } else {
          card.className = 'class-card upcoming-class';
          card.style.setProperty('--subject-color', color);
          card.innerHTML = `
            <div class="status-badge">Upcoming</div>
            <div class="class-title">${item.name}</div>
            <div class="class-time">Starts at ${format12Hour(safeStart)}</div>
            ${roomBadge}
            ${countdownElementText}
        `;
        }
        listContainer.appendChild(card);
      });

      if (activeCardElement && !hasInitiallyAnchored) {
        setTimeout(() => {
          activeCardElement.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
          hasInitiallyAnchored = true; 
        }, 300);
      }
    }

    function buildWeekModalGrid(schedule) {
      const target = document.getElementById('modal-grid-target');
      target.innerHTML = '';
      
      const orderOfDays = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];

      orderOfDays.forEach(day => {
        const dayData = schedule[day];
        if ((day === 'Saturday' || day === 'Sunday') && (!dayData || Object.keys(dayData).length === 0)) {
          return;
        }

        const col = document.createElement('div');
        col.className = 'day-column';
        col.innerHTML = `<div class="day-header">${day.substring(0,3)}</div>`;

        if (dayData) {
          const sorted = Object.values(dayData).sort((a,b) => padTimeStr(a.start).localeCompare(padTimeStr(b.start)));
          sorted.forEach(item => {
            const color = getSubjectColor(item.name);
            const roomTxt = item.room ? ` | Rm: ${item.room}` : '';
            const mini = document.createElement('div');
            mini.className = 'mini-card';
            mini.style.setProperty('--subject-color', color);
            mini.innerHTML = `
              <div class="mini-title">${item.name}</div>
              <div class="mini-meta">${format12Hour(padTimeStr(item.start))}${roomTxt}</div>
            `;
            col.appendChild(mini);
          });
        } else {
          col.innerHTML += `<div style="text-align:center; color:#555; padding-top:10px; font-size:0.8rem;">Off</div>`;
        }
        target.appendChild(col);
      });
    }

    const modal = document.getElementById('week-modal');
    document.getElementById('open-week-btn').addEventListener('click', () => modal.style.display = 'block');
    document.getElementById('close-week-btn').addEventListener('click', () => modal.style.display = 'none');
    window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });

    function padTimeStr(str) {
      const [h, m] = str.split(':');
      return `${h.padStart(2, '0')}:${m}`;
    }

    function parseTimeToMinutes(timeStr) {
      const [h, m] = timeStr.split(':').map(Number);
      return (h * 60) + m;
    }

    function format12Hour(timeStr) {
      const [h, m] = timeStr.split(':');
      let hour = parseInt(h);
      const ampm = hour >= 12 ? 'pm' : 'am';
      hour = hour % 12 || 12;
      return `${hour}:${m}${ampm}`;
    }
  </script>
</body>
