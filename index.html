<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Library Manager</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --accent: #6366f1; --bg: #f8fafc; }
        body { font-family: system-ui; background: var(--bg); padding: 10px; }
        #reader { width: 100%; max-width: 500px; border-radius: 15px; overflow: hidden; margin: 10px auto; }
        .book-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); display: flex; gap: 15px; }
        .cover-img { width: 80px; height: 120px; object-fit: cover; background: #ddd; border-radius: 4px; }
        .details { flex: 1; font-size: 0.9rem; }
        .badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; }
        .avail { background: #dcfce7; color: #166534; }
        .out { background: #fee2e2; color: #991b1b; }
        .scan-bar { background: var(--accent); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <button class="scan-bar" id="startScan">📸 SCAN NEW BOOK (ISBN)</button>
    <div id="reader" style="display:none;"></div>

    <div id="libraryContainer"></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA1cOfZneI_ss-QmQCkZostIQngpQ_JbtE",
        authDomain: "to-do-list-2fbf9.firebaseapp.com",
        databaseURL: "https://to-do-list-2fbf9-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "to-do-list-2fbf9",
        storageBucket: "to-do-list-2fbf9.firebasestorage.app",
        messagingSenderId: "712067178045",
        appId: "1:712067178045:web:e4091b51ce4b8fb1d69454"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const libRef = ref(db, 'master_library');

    // SCANNER SETUP
    const scanner = new Html5Qrcode("reader");
    document.getElementById('startScan').onclick = () => {
        document.getElementById('reader').style.display = 'block';
        scanner.start({ facingMode: "environment" }, { fps: 10 }, (text) => {
            scanner.stop();
            document.getElementById('reader').style.display = 'none';
            processISBN(text);
        });
    };

    // FETCH ALL 25 CATEGORIES
    async function processISBN(isbn) {
        const url = `https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`;
        try {
            const res = await fetch(url);
            const data = await res.json();
            const b = data[`ISBN:${isbn}`];

            if (!b) return alert("Book Not Found!");

            const newBook = {
                title: b.title || "Unknown",
                publishDate: b.publish_date || "N/A",
                excerpts: b.excerpts ? b.excerpts[0].text : "None",
                isbn: isbn,
                author: b.authors ? b.authors.map(a => a.name).join(', ') : "Unknown",
                reservesPlaced: 0,
                publisher: b.publishers ? b.publishers[0].name : "N/A",
                seriesInfo: b.series ? b.series[0].name : "Standalone",
                language: b.languages ? b.languages[0].name : "English",
                tags: b.subjects ? b.subjects.slice(0,3).map(s => s.name).join(', ') : "None",
                genre: b.subjects ? b.subjects[0].name : "General",
                type: "Book",
                format: b.weight || "Physical",
                coverImage: b.cover ? b.cover.large : "",
                locationInLibrary: "Main Shelf", // Default
                pageCount: b.number_of_pages || 0,
                numCopies: 1,
                copyAvailability: "Available",
                currentUser: "None",
                ratings: b.rating || "No ratings",
                damageNotes: "None",
                lastUser: "N/A",
                summary: b.notes || "No summary available.",
                reviews: "None yet"
            };

            push(libRef, newBook);
        } catch (e) { console.error(e); }
    }

    // RENDER THE FULL DATA
    onValue(libRef, (snap) => {
        const container = document.getElementById('libraryContainer');
        container.innerHTML = '';
        const data = snap.val();
        
        for (let id in data) {
            const book = data[id];
            const card = document.createElement('div');
            card.className = 'book-card';
            card.innerHTML = `
                <img src="${book.coverImage}" class="cover-img">
                <div class="details">
                    <strong>${book.title}</strong> <span class="badge ${book.copyAvailability === 'Available' ? 'avail' : 'out'}">${book.copyAvailability}</span><br>
                    <small>By ${book.author}</small><hr>
                    <div style="font-size:0.75rem; color:#666;">
                        Location: ${book.locationInLibrary} | Pages: ${book.pageCount}<br>
                        Publisher: ${book.publisher} (${book.publishDate})<br>
                        Tags: ${book.tags}
                    </div>
                </div>
            `;
            container.appendChild(card);
        }
    });
</script>
</body>
</html>
