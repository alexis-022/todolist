<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Message Board</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        
        /* Chat Header */
        .header { background: #1e293b; padding: 15px; text-align: center; border-bottom: 2px solid #334155; }
        
        /* Message Area */
        #board { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        
        /* Message Bubbles */
        .msg { background: #334155; padding: 12px; border-radius: 12px; max-width: 80%; position: relative; animation: pop 0.2s ease; }
        .msg.me { align-self: flex-end; background: #3b82f6; }
        .user { font-size: 0.7rem; font-weight: bold; color: #94a3b8; margin-bottom: 4px; display: block; }
        .text { word-wrap: break-word; }
        .time { font-size: 0.6rem; opacity: 0.6; float: right; margin-top: 5px; }
        img { max-width: 100%; border-radius: 8px; margin-top: 10px; }

        /* Input Area */
        .input-area { background: #1e293b; padding: 20px; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: none; background: #0f172a; color: white; outline: none; }
        button { background: #3b82f6; color: white; border: none; padding: 0 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }

        @keyframes pop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="header">
    <h2 id="roomName">Global Board</h2>
</div>

<div id="board"></div>

<div class="input-area">
    <input type="text" id="msgInput" placeholder="Type a message or paste image URL...">
    <button id="sendBtn">Send</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA1cOfZneI_ss-QmQCkZostIQngpQ_JbtE",
        authDomain: "to-do-list-2fbf9.firebaseapp.com",
        databaseURL: "https://to-do-list-2fbf9-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "to-do-list-2fbf9",
        storageBucket: "to-do-list-2fbf9.firebasestorage.app",
        messagingSenderId: "712067178045",
        appId: "1:712067178045:web:e4091b51ce4b8fb1d69454"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const boardRef = ref(db, 'messages');

    // NICKNAME - Save to browser so it persists
    let myName = localStorage.getItem('user') || prompt("Pick a nickname:") || "Guest";
    localStorage.setItem('user', myName);

    const input = document.getElementById('msgInput');
    const btn = document.getElementById('sendBtn');
    const board = document.getElementById('board');

    // SEND LOGIC
    btn.onclick = () => {
        if (input.value.trim()) {
            push(boardRef, {
                user: myName,
                text: input.value,
                time: Date.now()
            });
            input.value = "";
        }
    };

    // RECEIVE LOGIC
    onChildAdded(boardRef, (snap) => {
        const data = snap.val();
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${data.user === myName ? 'me' : ''}`;
        
        const time = new Date(data.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
        
        // Basic Image Detection: If text ends in .jpg, .png, .gif
        let content = `<span class="text">${data.text}</span>`;
        if (data.text.match(/\.(jpeg|jpg|gif|png)$/) != null) {
            content += `<br><img src="${data.text}">`;
        }

        msgDiv.innerHTML = `
            <span class="user">${data.user}</span>
            ${content}
            <span class="time">${time}</span>
        `;
        
        board.appendChild(msgDiv);
        board.scrollTop = board.scrollHeight; // Auto-scroll to bottom
    });

    input.onkeypress = (e) => { if(e.key === "Enter") btn.click(); };
</script>

</body>
</html>
