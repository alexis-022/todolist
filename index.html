<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Intelligence Library</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --p: #6366f1; --bg: #0b0f1a; --card: rgba(30, 41, 59, 0.7); --t: #f8fafc; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--t); margin: 0; padding: 15px; min-height: 100vh; }

        /* Session Defaults Bar */
        .session-defaults { background: #1e293b; padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--p); display: flex; flex-direction: column; gap: 8px; }
        .session-defaults h4 { margin: 0; font-size: 11px; text-transform: uppercase; color: var(--p); }
        .default-inputs { display: flex; gap: 10px; }
        .default-inputs input { flex: 1; padding: 8px; font-size: 12px; background: #0b0f1a; border: 1px solid #334155; color: white; border-radius: 6px; }

        .search-input { width: 100%; background: var(--card); border: 1px solid rgba(255,255,255,0.1); padding: 14px; border-radius: 14px; color: white; margin-bottom: 20px; backdrop-filter: blur(10px); }
        .book-grid { display: grid; gap: 12px; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); padding-bottom: 100px; }
        .book-card { background: var(--card); border-radius: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,0.05); }
        .card-img { width: 100%; aspect-ratio: 2/3; object-fit: cover; background: #1e293b; }
        .card-meta { padding: 8px; font-size: 0.75rem; }

        #scanner-view { display: none; position: fixed; inset: 0; background: #000; z-index: 5000; flex-direction: column; }
        #reader { flex: 1; }
        .close-scan { position: absolute; top: 30px; right: 20px; background: #ef4444; border: none; color: white; padding: 8px 16px; border-radius: 20px; z-index: 5001; font-weight: bold; }

        #modal { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 4000; padding: 20px; overflow-y: auto; }
        .modal-content { max-width: 600px; margin: auto; }
        .timer-track { width: 100%; height: 4px; background: #334155; border-radius: 2px; margin-bottom: 20px; overflow: hidden; }
        #timerBar { width: 100%; height: 100%; background: var(--p); transform-origin: left; transition: transform 5s linear; }
        .paused { transform: scaleX(1) !important; background: #f59e0b !important; transition: none !important; }

        .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .wide { grid-column: span 2; }
        label { font-size: 9px; font-weight: 800; color: var(--p); text-transform: uppercase; display: block; margin-bottom: 3px; }
        input, textarea { width: 100%; background: #1e293b; border: 1px solid #334155; padding: 10px; border-radius: 8px; color: white; font-size: 14px; }
        
        .fab { position: fixed; bottom: 25px; right: 25px; width: 60px; height: 60px; background: var(--p); border-radius: 50%; border: none; color: white; font-size: 24px; z-index: 100; }
        .save-btn { background: var(--p); color: white; border: none; padding: 16px; border-radius: 12px; width: 100%; font-weight: 800; margin: 15px 0; }
        .duplicate-alert { background: #f59e0b; color: #000; padding: 12px; border-radius: 8px; margin-bottom: 15px; font-weight: bold; display: none; }
    </style>
</head>
<body>

    <div class="session-defaults">
        <h4>Session Defaults</h4>
        <div class="default-inputs">
            <input type="text" id="def-location" placeholder="Default Location (e.g. Shelf A)">
            <input type="text" id="def-genre" placeholder="Default Genre">
        </div>
    </div>

    <input type="text" id="search" class="search-input" placeholder="Search title or ISBN...">
    <div class="book-grid" id="bookGrid"></div>
    <button class="fab" id="openScanner">📸</button>

    <div id="scanner-view">
        <button class="close-scan" id="stopScan">CANCEL</button>
        <div id="reader"></div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <div id="dupWarning" class="duplicate-alert">⚠️ You already have this book. Click "Save" to just add another copy.</div>
            <div class="timer-track"><div id="timerBar"></div></div>
            <div class="field-grid" id="formContainer"></div>
            <button class="save-btn" id="confirmSave">SAVE ENTRY</button>
            <button onclick="closeModal()" style="background:none; border:none; color:#94a3b8; width:100%">Cancel</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA1cOfZneI_ss-QmQCkZostIQngpQ_JbtE",
        authDomain: "to-do-list-2fbf9.firebaseapp.com",
        databaseURL: "https://to-do-list-2fbf9-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "to-do-list-2fbf9",
        storageBucket: "to-do-list-2fbf9.firebasestorage.app",
        messagingSenderId: "712067178045",
        appId: "1:712067178045:web:e4091b51ce4b8fb1d69454"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const libRef = ref(db, 'nexus_ultra_v1');

    const categories = [
        "title", "author", "isbn", "publishDate", "publisher", "genre", "seriesInfo", 
        "language", "pageCount", "locationInLibrary", "numCopies", "copyAvailability",
        "type", "format", "tags", "excerpts", "summary", "notes", "damageNotes",
        "currentUser", "lastUser", "reservesPlaced", "ratings", "reviews"
    ];

    const container = document.getElementById('formContainer');
    categories.forEach(cat => {
        const div = document.createElement('div');
        div.className = ["title", "summary", "excerpts", "reviews", "notes"].includes(cat) ? "wide" : "";
        div.innerHTML = `<label>${cat}</label><input id="f-${cat}" class="lib-input">`;
        container.appendChild(div);
    });

    let autoTimer, currentBook = {}, editingId = null, allBooks = [];
    const scanner = new Html5Qrcode("reader");

    document.getElementById('openScanner').onclick = () => {
        document.getElementById('scanner-view').style.display = 'flex';
        scanner.start({ facingMode: "environment" }, { fps: 20 }, onScan);
    };

    document.getElementById('stopScan').onclick = () => { scanner.stop(); document.getElementById('scanner-view').style.display = 'none'; };

    async function onScan(isbn) {
        scanner.stop();
        document.getElementById('scanner-view').style.display = 'none';
        
        // CHECK FOR DUPLICATES FIRST
        const existingBook = allBooks.find(b => b.isbn === isbn);
        
        let bookInfo = { isbn: isbn };
        try {
            const gRes = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
            const gData = await gRes.json();
            if (gData.items?.[0]) {
                const vol = gData.items[0].volumeInfo;
                bookInfo = { ...bookInfo, title: vol.title, author: vol.authors?.join(', '), publisher: vol.publisher, publishDate: vol.publishedDate, pageCount: vol.pageCount, summary: vol.description, genre: vol.categories?.[0], language: vol.language, cover: vol.imageLinks?.thumbnail?.replace('http:', 'https:') };
            }
        } catch(e) { console.error("API error"); }

        // MAPPING: Apply Session Defaults and remove 'Nil'
        categories.forEach(c => {
            let val = bookInfo[c] || "";
            if (c === 'locationInLibrary' && document.getElementById('def-location').value) val = document.getElementById('def-location').value;
            if (c === 'genre' && document.getElementById('def-genre').value) val = document.getElementById('def-genre').value;
            if (c === 'numCopies' && !val) val = 1;
            currentBook[c] = val;
        });
        currentBook.cover = bookInfo.cover || "";

        if (existingBook) {
            document.getElementById('dupWarning').style.display = 'block';
            editingId = existingBook.id; // Switch to update mode for that ID
            currentBook.numCopies = parseInt(existingBook.numCopies || 1) + 1;
            showModal(currentBook, existingBook.id, true);
        } else {
            document.getElementById('dupWarning').style.display = 'none';
            showModal(currentBook);
        }
    }

    function showModal(book, id = null, isDuplicate = false) {
        editingId = id;
        categories.forEach(c => document.getElementById(`f-${c}`).value = book[c]);
        document.getElementById('modal').style.display = 'block';
        
        const bar = document.getElementById('timerBar');
        bar.classList.remove('paused');
        bar.style.transform = 'scaleX(1)';

        // AUTO SAVE LOGIC (Disabled if it's a duplicate or manual edit)
        if (!id) {
            setTimeout(() => { bar.style.transform = 'scaleX(0)'; }, 50);
            autoTimer = setTimeout(save, 5000);
        } else {
            bar.classList.add('paused');
        }
    }

    document.getElementById('formContainer').addEventListener('focusin', () => {
        clearTimeout(autoTimer);
        document.getElementById('timerBar').classList.add('paused');
    });

    function save() {
        clearTimeout(autoTimer);
        const data = { cover: currentBook.cover || "" };
        categories.forEach(c => data[c] = document.getElementById(`f-${c}`).value);
        
        if (editingId) update(ref(db, `nexus_ultra_v1/${editingId}`), data);
        else push(libRef, data);

        closeModal();
        document.getElementById('openScanner').click();
    }

    function closeModal() {
        clearTimeout(autoTimer);
        document.getElementById('modal').style.display = 'none';
        editingId = null;
    }

    document.getElementById('confirmSave').onclick = save;

    onValue(libRef, (snap) => {
        const data = snap.val();
        allBooks = data ? Object.entries(data).map(([id, v]) => ({id, ...v})) : [];
        render();
    });

    function render(list = allBooks) {
        const grid = document.getElementById('bookGrid');
        grid.innerHTML = '';
        list.forEach(b => {
            const div = document.createElement('div');
            div.className = 'book-card';
            div.onclick = () => showModal(b, b.id);
            div.innerHTML = `<img src="${b.cover || 'https://via.placeholder.com/150x225?text=No+Cover'}" class="card-img"><div class="card-meta"><strong>${b.title}</strong><br>${b.author}</div>`;
            grid.appendChild(div);
        });
    }

    document.getElementById('search').oninput = (e) => {
        const v = e.target.value.toLowerCase();
        render(allBooks.filter(b => (b.title || "").toLowerCase().includes(v) || (b.isbn || "").includes(v)));
    };
</script>
</body>
</html>
