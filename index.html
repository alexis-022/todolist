<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Library: Auto-Sync</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --accent: #6366f1; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); padding: 15px; margin: 0; }
        
        /* Search Bar */
        .search-box { width: 100%; padding: 12px; border-radius: 10px; border: 2px solid #ddd; margin-bottom: 15px; box-sizing: border-box; font-size: 1rem; }
        
        /* Modal & Timer Bar */
        #editModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; padding: 20px; overflow-y: auto; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; max-width: 450px; margin: auto; position: relative; }
        #timerBar { height: 4px; background: var(--accent); width: 100%; transition: width 5s linear; margin-bottom: 15px; border-radius: 2px; }
        
        /* Cards */
        .book-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; gap: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .cover-img { width: 70px; height: 100px; object-fit: cover; border-radius: 4px; background: #eee; }
        
        input, textarea { width: 100%; margin-bottom: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        .btn { background: var(--accent); color: white; border: none; width: 100%; padding: 15px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

    <input type="text" id="searchBar" class="search-box" placeholder="🔍 Search Title, Author, Genre, or ISBN...">
    
    <button class="btn" id="startScan">📸 SCAN ISBN</button>
    <div id="reader" style="display:none; margin-bottom: 20px;"></div>

    <div id="libraryContainer"></div>

    <div id="editModal">
        <div class="modal-content">
            <div id="timerBar"></div>
            <h3>New Book Found!</h3>
            <p style="font-size: 0.8rem; color: #666;">Saving automatically in 5 seconds...</p>
            <label>Location</label><input type="text" id="editLocation" placeholder="e.g. Shelf A">
            <label>Damage / Notes</label><textarea id="editNotes" placeholder="e.g. Creased spine"></textarea>
            <button class="btn" id="saveConfirmBtn">✅ Save Now</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyA1cOfZneI_ss-QmQCkZostIQngpQ_JbtE",
        authDomain: "to-do-list-2fbf9.firebaseapp.com",
        databaseURL: "https://to-do-list-2fbf9-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "to-do-list-2fbf9",
        storageBucket: "to-do-list-2fbf9.firebasestorage.app",
        messagingSenderId: "712067178045",
        appId: "1:712067178045:web:e4091b51ce4b8fb1d69454"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const libRef = ref(db, 'master_library');

    let autoSaveTimer;
    let currentBookData = {};
    let allBooks = []; // Local copy for searching

    // --- SCANNER ---
    const scanner = new Html5Qrcode("reader");
    document.getElementById('startScan').onclick = () => {
        document.getElementById('reader').style.display = 'block';
        scanner.start({ facingMode: "environment" }, { fps: 10 }, (text) => {
            scanner.stop();
            document.getElementById('reader').style.display = 'none';
            fetchBookData(text);
        });
    };

    // --- FETCH & AUTO-SAVE LOGIC ---
    async function fetchBookData(isbn) {
        const res = await fetch(`https://openlibrary.org/api/books?bibkeys=ISBN:${isbn}&format=json&jscmd=data`);
        const data = await res.json();
        const b = data[`ISBN:${isbn}`];

        if (!b) return alert("Book Not Found!");

        currentBookData = {
            title: b.title || "Nil",
            publishDate: b.publish_date || "Nil",
            excerpts: b.excerpts ? b.excerpts[0].text : "Nil",
            isbn: isbn,
            author: b.authors ? b.authors.map(a => a.name).join(', ') : "Nil",
            reservesPlaced: 0,
            publisher: b.publishers ? b.publishers[0].name : "Nil",
            seriesInfo: b.series ? b.series[0].name : "Nil",
            language: b.languages ? b.languages[0].name : "Nil",
            tags: b.subjects ? b.subjects.slice(0,3).map(s => s.name).join(', ') : "Nil",
            genre: b.subjects ? b.subjects[0].name : "Nil",
            type: "Book",
            format: "Physical",
            coverImage: b.cover ? b.cover.large : "",
            locationInLibrary: "Nil",
            pageCount: b.number_of_pages || "Nil",
            numCopies: 1,
            copyAvailability: "Available",
            currentUser: "None",
            ratings: "Nil",
            damageNotes: "Nil",
            lastUser: "Nil",
            summary: b.notes || "Nil",
            reviews: "Nil"
        };

        showModal();
    }

    function showModal() {
        const modal = document.getElementById('editModal');
        const bar = document.getElementById('timerBar');
        modal.style.display = 'block';
        bar.style.width = '100%';
        
        // Reset inputs
        document.getElementById('editLocation').value = "";
        document.getElementById('editNotes').value = "";

        // Start the 5-second countdown
        setTimeout(() => { bar.style.width = '0%'; }, 10);
        autoSaveTimer = setTimeout(commitToFirebase, 5000);
    }

    function commitToFirebase() {
        clearTimeout(autoSaveTimer);
        const loc = document.getElementById('editLocation').value;
        const notes = document.getElementById('editNotes').value;
        
        currentBookData.locationInLibrary = loc || "Nil";
        currentBookData.damageNotes = notes || "Nil";

        push(libRef, currentBookData);
        document.getElementById('editModal').style.display = 'none';
    }

    document.getElementById('saveConfirmBtn').onclick = commitToFirebase;

    // --- SEARCH & RENDER ---
    onValue(libRef, (snap) => {
        allBooks = snap.val() ? Object.values(snap.val()) : [];
        renderBooks(allBooks);
    });

    function renderBooks(books) {
        const container = document.getElementById('libraryContainer');
        container.innerHTML = '';
        books.forEach(book => {
            const card = document.createElement('div');
            card.className = 'book-card';
            card.innerHTML = `
                <img src="${book.coverImage}" class="cover-img">
                <div style="flex:1">
                    <strong>${book.title}</strong><br>
                    <small>By ${book.author}</small><br>
                    <small style="color: #666;">Loc: ${book.locationInLibrary} | ISBN: ${book.isbn}</small>
                </div>
            `;
            container.appendChild(card);
        });
    }

    document.getElementById('searchBar').oninput = (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allBooks.filter(b => 
            b.title.toLowerCase().includes(term) || 
            b.author.toLowerCase().includes(term) || 
            b.isbn.includes(term) || 
            b.genre.toLowerCase().includes(term)
        );
        renderBooks(filtered);
    };
</script>
</body>
</html>
