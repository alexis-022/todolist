<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Good Morning Dashboard</title>
  <style>
    :root {
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --text-main: #ffffff;
      --text-muted: #aaaaaa;
      --active-accent: #1565C0;
      --active-glow: #00E676;
      --upcoming-accent: #FFD600;
    }

    body {
      font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-main);
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #timetable-container {
      width: 100%;
      max-width: 450px;
      background: var(--card-bg);
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    h2 {
      margin-top: 0;
      margin-bottom: 5px;
      font-size: 1.5rem;
    }

    #current-time {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 25px;
    }

    #classes-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .class-card {
      padding: 16px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-left: 5px solid transparent;
      transition: all 0.4s ease;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    /* Active / Current Class Styling */
    .active-class {
      background: var(--active-accent);
      border-left-color: var(--active-glow);
      transform: scale(1.02);
      box-shadow: 0 4px 20px rgba(0, 230, 118, 0.2);
    }

    .active-status {
      font-weight: bold;
      color: var(--active-glow);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Past Class Styling */
    .past-class {
      opacity: 0.25;
      filter: grayscale(100%);
    }

    /* Upcoming Class Styling */
    .upcoming-class {
      border-left-color: var(--upcoming-accent);
    }

    .class-title {
      font-size: 1.2rem;
      font-weight: 600;
    }

    .class-time {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .active-class .class-time {
      color: rgba(255, 255, 255, 0.8);
    }

    .no-classes {
      text-align: center;
      padding: 30px;
      color: var(--text-muted);
      font-size: 1.1rem;
    }
  </style>
</head>
<body>

  <div id="timetable-container">
    <h2 id="current-day">Loading day...</h2>
    <div id="current-time">00:00:00</div>
    <div id="classes-list">
      <div class="no-classes">Connecting to Firebase...</div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
    import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-database.js";

    // 1. Replace with your actual Firebase Realtime Database URL
const firebaseConfig = {
  apiKey: "AIzaSyA1cOfZneI_ss-QmQCkZostIQngpQ_JbtE",
  authDomain: "to-do-list-2fbf9.firebaseapp.com",
  databaseURL: "https://to-do-list-2fbf9-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "to-do-list-2fbf9",
  storageBucket: "to-do-list-2fbf9.firebasestorage.app",
  messagingSenderId: "712067178045",
  appId: "1:712067178045:web:e4091b51ce4b8fb1d69454"
};

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    // 2. Fetch data once from RTDB and boot up the dynamic loop
    const timetableRef = ref(database, 'timetable');
    get(timetableRef).then((snapshot) => {
      if (snapshot.exists()) {
        const fullSchedule = snapshot.val();
        
        // Run immediately on load, then update every second
        updateDashboard(fullSchedule);
        setInterval(() => {
          updateDashboard(fullSchedule);
        }, 1000);
      } else {
        document.getElementById('classes-list').innerHTML = "<div class='no-classes'>❌ No schedule data found in database.</div>";
      }
    }).catch((error) => {
      console.error(error);
      document.getElementById('classes-list').innerHTML = "<div class='no-classes'>❌ Error loading database. Check console.</div>";
    });

    // 3. Main tracking loop logic
    function updateDashboard(schedule) {
      const now = new Date();
      
      // Update the digital clock header
      const timeOptions = { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true };
      document.getElementById('current-time').innerText = now.toLocaleTimeString([], timeOptions);

      // Identify the current day name
      const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
      const currentDay = days[now.getDay()];
      document.getElementById('current-day').innerText = `Today is ${currentDay}`;

      // Convert current clock time to "HH:MM" string format for straight mathematical comparisons
      const hours = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const currentTimeString = `${hours}:${minutes}`; 

      const todaysClasses = schedule[currentDay];
      const listContainer = document.getElementById('classes-list');
      listContainer.innerHTML = ''; // Fresh render loop frame

      // Weekend or day off fallback
      if (!todaysClasses) {
        listContainer.innerHTML = "<div class='no-classes'>No classes scheduled today! Enjoy your day. 😎</div>";
        return;
      }

      // Cycle through each period row
      Object.keys(todaysClasses).forEach(periodKey => {
        const item = todaysClasses[periodKey];
        const classElement = document.createElement('div');
        classElement.className = 'class-card';

        // Check time boundaries
        if (currentTimeString >= item.start && currentTimeString <= item.end) {
          // In Class Now
          classElement.classList.add('active-class');
          classElement.innerHTML = `
            <div class="active-status">🚨 In Progress</div>
            <div class="class-title">${item.name}</div>
            <div class="class-time">${item.start} - ${item.end}</div>
          `;
        } else if (currentTimeString > item.end) {
          // Class is over
          classElement.classList.add('past-class');
          classElement.innerHTML = `
            <div class="class-title"><strike>${item.name}</strike></div>
            <div class="class-time">Finished</div>
          `;
        } else {
          // Class is upcoming later today
          classElement.classList.add('upcoming-class');
          classElement.innerHTML = `
            <div class="class-title">${item.name}</div>
            <div class="class-time">Starts at ${item.start}</div>
          `;
        }

        listContainer.appendChild(classElement);
      });
    }
  </script>
</body>
</html>
